<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="description" content="Interactive knowledge maps for mastering ML, AI engineering, and more. Visualize topic connections and track your learning progress.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Knowledge">
  <meta name="theme-color" content="#0A0E16">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icon.png">
  <title>Knowledge Hub</title>
  <link rel="stylesheet" href="assets/hub.css">
</head>
<body>
<div class="topbar">
  <a class="brand" href="index.html" aria-label="All hubs — home">
    <img class="emblem" src="assets/icon.png" alt="">
    <span class="btxt"><span class="kbd">roadmap.sh · learning map</span>
    <h1>Machine Learning Engineer <span>/ the path &amp; how it links</span></h1></span></a>
  <div class="progwrap"><div class="progbar"><div class="progfill" id="progfill"></div></div>
    <span class="progtxt"><b id="progN">0</b>/112</span></div>
  <div class="search"><input id="search" type="text" placeholder="find a topic…" autocomplete="off" spellcheck="false"></div>
  <button class="modebtn" id="focusBtn"><span class="lk">🔒</span>Focus</button>
  <div class="zoom"><button class="zbtn" id="zout">−</button><button class="zbtn" id="zfit">⤢</button><button class="zbtn" id="zin">+</button></div>
</div>

<div class="stage" id="stage">
  <div class="canvas" id="canvas">
    <div class="map" id="map">
      <svg class="links" id="links"></svg>
    </div>
  </div>
</div>

<div class="legend"><h4>How topics connect</h4>
  <div class="legrow"><span class="ed" style="border-color:var(--gold);border-top-style:dashed"></span> is a prerequisite for</div>
  <div class="legrow"><span class="ed" style="border-color:var(--cyan)"></span> builds on / leads to</div>
  <div class="legrow"><span class="ed" style="border-color:var(--mint);border-top-style:dotted"></span> is applied in / uses</div>
</div>
<div class="hint">hover a card to trace links · click for detail<br>scroll or drag to move · pinch / +– to zoom</div>

<div class="scrim" id="scrim"></div>
<div class="toast" id="toast"></div>
<div class="peek" id="peek">
  <span class="pk-dot" id="pkDot"></span>
  <div class="pk-txt"><div class="pk-ttl" id="pkTtl"></div><div class="pk-sub" id="pkSub"></div></div>
  <button class="pk-btn" id="pkBtn">Details ›</button>
  <button class="pk-x" id="pkX">✕</button>
</div>
<aside class="panel" id="panel" aria-hidden="true">
  <div class="panel-top"><button class="close" id="close">✕</button>
    <div class="dchip" id="dchip"></div><h3 id="ptitle">—</h3></div>
  <div class="panel-body" id="pbody"></div>
  <div class="panel-foot"><button class="markbtn" id="markbtn">✓ Mark complete</button></div>
</aside>

<script src="assets/hub.js" data-default="ml"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});</script>
</body>
</html>
