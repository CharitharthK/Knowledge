<style>
:root{
  --ink:#070A10; --bg:#0A0E16; --panel:#0F141F; --panel2:#141A28;
  --line:#1F2738; --line2:#26304a; --line-bright:#33405A;
  --text:#D6DEEC; --muted:#7b8398; --muted2:#5d667c; --faint:#39455e;
  --gold:#F0B23C; --cyan:#46B8DA; --mint:#54C99A; --violet:#B08CF0; --coral:#F0796B;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:15px;
  -webkit-font-smoothing:antialiased}
a{color:var(--cyan);text-decoration:none}a:hover{text-decoration:underline}

.topbar{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;gap:18px;
  flex-wrap:wrap;padding:14px 22px;padding-top:calc(14px + env(safe-area-inset-top));
  padding-left:calc(22px + env(safe-area-inset-left));padding-right:calc(22px + env(safe-area-inset-right));
  background:linear-gradient(180deg,rgba(10,14,22,.97),rgba(10,14,22,.85));border-bottom:1px solid var(--line)}
.brand{margin-right:auto;display:flex;flex-direction:column;gap:1px}
.brand .kbd{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold)}
.brand h1{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:18px;margin:0;letter-spacing:-.01em}
.brand h1 span{color:var(--muted2);font-weight:400}
.search{position:relative}
.search input{width:200px;background:var(--panel);border:1px solid var(--line2);color:var(--text);
  font-family:"JetBrains Mono",monospace;font-size:13px;padding:9px 12px 9px 32px;border-radius:8px;outline:none;
  transition:border-color .15s,width .2s}
.search input:focus{border-color:var(--gold);width:230px}
.search::before{content:"";position:absolute;left:11px;top:50%;width:12px;height:12px;transform:translateY(-50%);
  border:1.6px solid var(--muted2);border-radius:50%;box-shadow:5px 5px 0 -4px var(--muted2)}
.progwrap{display:flex;align-items:center;gap:9px;font-family:"JetBrains Mono",monospace;font-size:12px}
.progbar{width:96px;height:5px;background:var(--line);border-radius:99px;overflow:hidden}
.progfill{height:100%;width:0;background:linear-gradient(90deg,var(--mint),var(--cyan));transition:width .4s}
.progtxt{color:var(--muted2)}.progtxt b{color:var(--mint)}
.zoom{display:flex;gap:6px}
.zbtn{font-family:"JetBrains Mono",monospace;font-size:13px;width:34px;height:34px;background:var(--panel);
  border:1px solid var(--line2);color:var(--muted);border-radius:8px;cursor:pointer;transition:.15s}
.zbtn:hover{color:var(--text);border-color:var(--line-bright)}

.topbar{min-height:60px}
.stage{position:absolute;inset:64px 0 0 0;overflow:auto;cursor:grab;touch-action:pan-x pan-y;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.canvas{position:relative;transform-origin:0 0}
.stage.grab{cursor:grabbing}
.stage::-webkit-scrollbar{height:11px;width:11px}
.stage::-webkit-scrollbar-thumb{background:var(--line2);border-radius:99px;border:3px solid var(--bg)}
.map{position:relative;transform-origin:0 0}
svg.links{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;z-index:1}
.lk{fill:none;stroke-width:1.5;opacity:.12;transition:opacity .18s,stroke-width .18s}
.lk.prereq{stroke:var(--gold);stroke-dasharray:5 4}
.lk.builds{stroke:var(--cyan)}
.lk.applies{stroke:var(--mint);stroke-dasharray:1.5 5}
.lk.hot{opacity:.95;stroke-width:2.4}
.lk.cold{opacity:.03}

.colhead{position:absolute;z-index:2;font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.13em;
  text-transform:uppercase;color:var(--muted2);display:flex;align-items:center;gap:9px;white-space:nowrap}
.colhead .n{color:var(--gold);font-weight:700}
.colhead .ln{width:26px;height:1px;background:var(--line2)}

.card{position:absolute;z-index:2;background:linear-gradient(180deg,var(--panel),var(--ink));
  border:1px solid var(--line);border-left:3px solid var(--cdom,var(--line));border-radius:11px;padding:11px 13px 12px;
  transition:border-color .15s,box-shadow .18s,opacity .18s,transform .15s;cursor:pointer}
.card:hover{border-color:var(--line-bright);box-shadow:0 14px 34px -22px rgba(0,0,0,.9)}
.card.cold{opacity:.28}
.card.hot{border-color:var(--cdom);box-shadow:0 0 0 1px var(--cdom),0 16px 40px -22px var(--cdom)}
.card.sel{border-color:var(--cdom);box-shadow:0 0 0 1.5px var(--cdom)}
.card .ttl{display:flex;align-items:center;gap:8px;font-family:"Space Grotesk",sans-serif;font-weight:600;
  font-size:14px;letter-spacing:-.01em;line-height:1.2}
.card .ttl .dot{width:8px;height:8px;border-radius:50%;background:var(--cdom);flex:none}
.card .ttl .cnt{margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted2);
  background:var(--line);padding:1px 6px;border-radius:99px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.chip{font-size:11.5px;color:var(--muted);background:rgba(255,255,255,.025);border:1px solid var(--line);
  padding:3px 8px;border-radius:6px;cursor:pointer;transition:.12s;line-height:1.3;display:inline-flex;align-items:center;gap:5px}
.chip:hover{color:var(--text);border-color:var(--cdom);background:rgba(255,255,255,.05)}
.chip.done{color:var(--muted2);text-decoration:line-through;text-decoration-color:var(--faint);border-color:var(--line)}
.chip .cd{width:5px;height:5px;border-radius:50%;background:var(--faint)}
.chip.done .cd{background:var(--mint)}

/* legend */
.legend{position:absolute;left:calc(16px + env(safe-area-inset-left));bottom:calc(14px + env(safe-area-inset-bottom));z-index:25;background:rgba(12,16,24,.86);
  border:1px solid var(--line);border-radius:11px;padding:11px 14px;backdrop-filter:blur(8px);font-size:12px}
.legend h4{margin:0 0 8px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.13em;
  text-transform:uppercase;color:var(--muted2)}
.legrow{display:flex;align-items:center;gap:9px;margin:5px 0;color:var(--muted)}
.legrow .ed{width:22px;border-top-width:2px;border-top-style:solid;flex:none}
.hint{position:absolute;right:calc(16px + env(safe-area-inset-right));bottom:calc(14px + env(safe-area-inset-bottom));z-index:25;font-family:"JetBrains Mono",monospace;font-size:11px;
  color:var(--muted2);text-align:right;line-height:1.7;pointer-events:none}

/* mobile peek bar (connection tracing) */
.peek{position:fixed;left:50%;bottom:calc(14px + env(safe-area-inset-bottom));transform:translate(-50%,140%);
  z-index:45;display:flex;align-items:center;gap:11px;max-width:min(440px,calc(100vw - 28px));
  background:rgba(15,20,31,.96);border:1px solid var(--line-bright);border-radius:14px;
  padding:10px 12px;backdrop-filter:blur(10px);box-shadow:0 18px 40px -18px rgba(0,0,0,.8);
  transition:transform .26s cubic-bezier(.2,.8,.2,1);opacity:0;pointer-events:none}
.peek.show{transform:translate(-50%,0);opacity:1;pointer-events:auto}
.peek .pk-dot{width:11px;height:11px;border-radius:50%;flex:none}
.peek .pk-txt{min-width:0}
.peek .pk-ttl{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.peek .pk-sub{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--muted2);margin-top:2px;white-space:nowrap}
.peek .pk-btn{font-family:"JetBrains Mono",monospace;font-size:12px;flex:none;border:1px solid var(--gold);
  background:rgba(240,178,60,.1);color:var(--gold);padding:8px 12px;border-radius:9px;cursor:pointer;transition:.15s}
.peek .pk-btn:active{background:rgba(240,178,60,.22)}
.peek .pk-x{flex:none;width:30px;height:30px;border:1px solid var(--line2);background:var(--panel);color:var(--muted);
  border-radius:9px;cursor:pointer;font-size:13px}

/* panel */
.scrim{position:fixed;inset:0;background:rgba(4,6,10,.5);opacity:0;pointer-events:none;transition:.2s;z-index:40}
.scrim.show{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;right:0;height:100%;width:min(440px,92vw);z-index:50;
  background:linear-gradient(180deg,var(--panel2),var(--panel));border-left:1px solid var(--line-bright);
  transform:translateX(102%);transition:transform .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;
  box-shadow:-30px 0 60px -30px rgba(0,0,0,.7)}
.panel.open{transform:none}
.panel-top{padding:22px 24px 18px;border-bottom:1px solid var(--line);position:relative}
.dchip{display:inline-flex;align-items:center;gap:7px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);margin-bottom:12px}
.dchip .sw{width:9px;height:9px;border-radius:50%}
.panel-top h3{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:22px;margin:0;letter-spacing:-.015em;line-height:1.2}
.close{position:absolute;top:18px;right:18px;background:var(--panel);border:1px solid var(--line2);color:var(--muted);
  width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;transition:.15s}
.close:hover{color:var(--text);border-color:var(--line-bright)}
.panel-body{padding:20px 24px;overflow-y:auto;flex:1}
.panel-body p{font-size:14.5px;line-height:1.62;margin:0 0 16px}
.sub-h{font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;
  color:var(--muted2);margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.sub-h::after{content:"";flex:1;height:1px;background:var(--line)}
.conn,.subitem{display:flex;align-items:center;gap:9px;padding:8px 10px;margin-bottom:6px;border-radius:8px;
  background:var(--panel);border:1px solid var(--line);cursor:pointer;transition:.13s;width:100%;text-align:left;color:var(--text)}
.conn:hover,.subitem:hover{border-color:var(--line-bright);transform:translateX(2px)}
.conn .rel{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;
  padding:2px 6px;border-radius:4px;flex:none;border:1px solid currentColor}
.conn .dotc,.subitem .dotc{width:7px;height:7px;border-radius:50%;flex:none}
.conn .cn,.subitem .cn{font-size:13.5px;line-height:1.3}
.res{display:flex;align-items:flex-start;gap:11px;padding:10px 12px;margin-bottom:7px;background:var(--panel);
  border:1px solid var(--line);border-radius:9px;transition:.15s}
.res:hover{border-color:var(--line-bright)}
.res .tag{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;
  padding:3px 6px;border-radius:4px;flex:none;margin-top:1px;background:var(--line);color:var(--muted)}
.res .tag.article{color:var(--cyan)}.res .tag.video{color:#E06A8B}.res .tag.course{color:var(--mint)}.res .tag.opensource{color:var(--gold)}
.res .rl{font-size:13.5px;line-height:1.4}.res:hover .rl{color:var(--cyan)}
.empty{color:var(--muted2);font-size:13px;font-style:italic}
.panel-foot{padding:14px 24px;border-top:1px solid var(--line)}
.markbtn{width:100%;font-family:"JetBrains Mono",monospace;font-size:13px;padding:11px;border-radius:9px;cursor:pointer;
  border:1px solid var(--mint);background:rgba(84,201,154,.08);color:var(--mint);transition:.15s}
.markbtn:hover{background:rgba(84,201,154,.16)}.markbtn.done{background:var(--line);border-color:var(--line2);color:var(--muted2)}
@media(max-width:600px){.legend,.hint{display:none}.brand h1{font-size:15px}.search input{width:120px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="kbd">roadmap.sh · learning map</span>
    <h1>Machine Learning Engineer <span>/ the path &amp; how it links</span></h1></div>

    <span class="progtxt"><b id="progN">0</b>/112</span></div>
  <div class="search"><input id="search" type="text" placeholder="find a topic…" autocomplete="off" spellcheck="false"></div>

</div>

</div>

<div class="legend"><h4>How topics connect</h4>

  <div class="legrow"><span class="ed" style="border-color:var(--cyan)"></span> builds on / leads to</div>

</div>
<div class="hint">hover a card to trace links · click for detail<br>scroll or drag to move · pinch / +– to zoom</div>

    <div class="dchip" id="dchip"></div><h3 id="ptitle">—</h3></div>
  <div class="panel-body" id="pbody"></div>
  <div class="panel-foot"><button class="markbtn" id="markbtn">✓ Mark complete</button></div>
</aside>

<script>
const D={"cols": [{"title": "Mathematics", "keys": ["s0-g0", "s0-g1", "s0-g2", "s0-g3"]}, {"title": "Programming", "keys": ["s1-g0", "s1-g1", "s1-g2", "s1-g3", "s1-g4"]}, {"title": "Data & Setup", "keys": ["s2-g0", "s3-g0", "s3-g1", "s4-g0"]}, {"title": "Learning Types", "keys": ["s5-g0", "s5-g1", "s6-g0", "s7-g0", "s8-g0", "s9-g0"]}, {"title": "Models", "keys": ["s7-g1", "s7-g2", "s8-g1", "s8-g2"]}, {"title": "Evaluation", "keys": ["s10-g0", "s10-g1", "s10-g2", "s10-g3"]}, {"title": "Deep Learning", "keys": ["s11-g0", "s11-g1", "s11-g2", "s11-g3", "s11-g4", "s11-g5"]}, {"title": "Advanced & NLP", "keys": ["s12-g0", "s12-g1", "s12-g2", "s12-g3"]}], "topics": {"s0-g0": {"key": "s0-g0", "label": "Calculus", "domain": "math", "desc": "Calculus is a branch of mathematics that deals with continuous change. It provides tools and techniques for understanding rates of change and accumulation. The two main branches are differential calculus, which focuses on finding the rate of change of a function, and integral calculus, which focuses on finding the accumulation of quantities. These concepts are fundamental for optimization, modeling, and understanding the behavior of functions.", "links": [{"type": "book", "title": "Calculus Online Textbook", "url": "https://ocw.mit.edu/courses/res-18-001-calculus-fall-2023/pages/textbook/"}, {"type": "article", "title": "Calculus", "url": "https://en.wikipedia.org/wiki/Calculus"}, {"type": "video", "title": "Calculus", "url": "https://www.youtube.com/playlist?list=PLybg94GvOJ9ELZEe9s2NXTKr41Yedbw7M"}], "col": 0, "subs": ["s0-g0-l0", "s0-g0-l1", "s0-g0-l2"]}, "s0-g1": {"key": "s0-g1", "label": "Linear Algebra", "domain": "math", "desc": "Linear algebra is a branch of mathematics that deals with vector spaces and linear transformations between those spaces. It involves concepts like vectors, matrices, and systems of linear equations, and provides tools for manipulating and solving problems involving these entities. Operations such as matrix multiplication, decomposition, and eigenvalue analysis are fundamental to this field.", "links": [{"type": "book", "title": "Linear algebra for data science", "url": "http://mitran-lab.amath.unc.edu/courses/MATH347DS/textbook.pdf"}, {"type": "book", "title": "Linear Algebra Done Right", "url": "https://linear.axler.net/LADR4e.pdf"}, {"type": "article", "title": "How I learned Linear Algebra, Probability and Statistics for Data Science", "url": "https://towardsdatascience.com/how-i-learned-linear-algebra-probability-and-statistics-for-data-science-b9d1c34dfa56/"}, {"type": "video", "title": "Linear Algebra for Machine Learning", "url": "https://www.youtube.com/watch?v=QCPJ0VdpM00"}], "col": 0, "subs": ["s0-g1-l0", "s0-g1-l1", "s0-g1-l2", "s0-g1-l3", "s0-g1-l4"]}, "s0-g2": {"key": "s0-g2", "label": "Discrete Mathematics", "domain": "math", "desc": "Discrete mathematics deals with mathematical structures that are fundamentally discrete rather than continuous. This means it focuses on objects that have distinct, separated values, like integers, graphs, and logical statements. It provides the theoretical foundations and tools for reasoning about and modeling these discrete structures. This field is essential for computer science, as it provides the foundation for understanding algorithms, data structures, and information networks.", "links": [{"type": "article", "title": "Discrete Mathematics", "url": "https://en.wikipedia.org/wiki/Discrete_mathematics"}, {"type": "article", "title": "Discrete Math (Full Course: Sets, Logic, Proofs, Probability, Graph Theory, etc)", "url": "https://www.youtube.com/playlist?list=PLHXZ9OQGMqxersk8fUxiUMSIx0DBqsKZS"}], "col": 0, "subs": []}, "s0-g3": {"key": "s0-g3", "label": "Statistics", "domain": "math", "desc": "Statistics is the science of collecting, analyzing, interpreting, presenting, and organizing data. It is a branch of mathematics that deals with the collection, analysis, interpretation, presentation, and organization of data. It is used in a wide range of fields, including science, engineering, medicine, and social science. Statistics is used to make informed decisions, to predict future events, and to test hypotheses. It is also used to summarize data, to describe relationships between variables, and to make inferences about populations based on samples.", "links": [{"type": "book", "title": "Introductory Statistics", "url": "https://assets.openstax.org/oscms-prodcms/media/documents/IntroductoryStatistics-OP_i6tAI7e.pdf"}, {"type": "article", "title": "Introduction to Statistics", "url": "https://imp.i384100.net/3eRv4v"}, {"type": "video", "title": "Statistics - A Full University Course on Data Science Basics", "url": "https://www.youtube.com/watch?v=xxpc-HPKN28"}], "col": 0, "subs": ["s0-g3-l0", "s0-g3-l1", "s0-g3-l2", "s0-g3-l3", "s0-g3-l4", "s0-g3-l5", "s0-g3-l6", "s0-g3-l7"]}, "s1-g0": {"key": "s1-g0", "label": "Python", "domain": "prog", "desc": "Python is an interpreted high-level general-purpose programming language. Its design philosophy emphasizes code readability with its significant use of indentation. Its language constructs as well as its object-oriented approach aim to help programmers write clear, logical code for small and large-scale projects. Python is dynamically-typed and garbage-collected. It supports multiple programming paradigms, including structured (particularly, procedural), object-oriented and functional programming. Python is often described as a \"batteries included\" language due to its comprehensive standard library.", "links": [{"type": "roadmap", "title": "Visit the Dedicated Python Developer Roadmap", "url": "https://roadmap.sh/python"}, {"type": "official", "title": "Python Website", "url": "https://www.python.org/"}, {"type": "article", "title": "Python - Wikipedia", "url": "https://en.wikipedia.org/wiki/Python_(programming_language"}, {"type": "article", "title": "Tutorial Series: How to Code in Python", "url": "https://www.digitalocean.com/community/tutorials/how-to-write-your-first-python-3-program"}, {"type": "article", "title": "Google's Python Class", "url": "https://developers.google.com/edu/python"}, {"type": "video", "title": "Learn Python - Full Course", "url": "https://www.youtube.com/watch?v=4M87qBgpafk"}], "col": 1, "subs": []}, "s1-g1": {"key": "s1-g1", "label": "Basic Syntax", "domain": "prog", "desc": "Python's basic syntax defines the rules for writing code that the interpreter can understand and execute. This includes how to structure lines of code, use indentation to define code blocks, write comments for explanation, assign values to variables, and perform basic operations using operators. Understanding these fundamental elements is essential for writing any Python program, including those used in machine learning.", "links": [{"type": "roadmap", "title": "isit Dedicated Python Roadmap", "url": "https://roadmap.sh/python"}, {"type": "video", "title": "Learn Python - Full Course", "url": "https://www.youtube.com/watch?v=4M87qBgpafk"}], "col": 1, "subs": ["s1-g1-l0", "s1-g1-l1", "s1-g1-l2", "s1-g1-l3", "s1-g1-l4", "s1-g1-l5"]}, "s1-g2": {"key": "s1-g2", "label": "Object Oriented Programming", "domain": "prog", "desc": "In Python, object-oriented Programming (OOPs) is a programming paradigm that uses objects and classes in programming. It aims to implement real-world entities like inheritance, polymorphism, encapsulation, etc., in programming. The main concept of OOPs is to bind the data and the functions that work on that together as a single unit so that no other part of the code can access this data.", "links": [{"type": "article", "title": "Object Oriented Programming in Python", "url": "https://realpython.com/python3-object-oriented-programming/"}, {"type": "video", "title": "Object Oriented Programming with Python - Full Course for Beginners", "url": "https://www.youtube.com/watch?v=Ej_02ICOIgs"}, {"type": "video", "title": "Object Oriented Programming (OOP) In Python - Beginner Crash Course", "url": "https://www.youtube.com/watch?v=-pEs-Bss8Wc/"}, {"type": "video", "title": "Python OOP Tutorial", "url": "https://www.youtube.com/watch?v=IbMDCwVm63M"}], "col": 1, "subs": []}, "s1-g3": {"key": "s1-g3", "label": "Essential libraries", "domain": "prog", "desc": "Python's popularity in data analysis stems from its rich ecosystem of specialized libraries. **NumPy** provides powerful tools for numerical computation, particularly with arrays and matrices. **Pandas** offers data structures like DataFrames, making it easy to organize, manipulate, and analyze tabular data. For visualization, **Matplotlib** is a fundamental library for creating static, interactive, and animated plots. Building on Matplotlib, **Seaborn** provides a high-level interface for drawing attractive and informative statistical graphics. These libraries collectively enable efficient data handling, exploration, and presentation.", "links": [], "col": 1, "subs": ["s1-g3-l0", "s1-g3-l1", "s1-g3-l2", "s1-g3-l3"]}, "s1-g4": {"key": "s1-g4", "label": "Programming Fundamentals", "domain": "prog", "desc": "", "links": [], "col": 1, "subs": ["s1-g4-l0", "s1-g4-l1", "s1-g4-l2", "s1-g4-l3", "s1-g4-l4"]}, "s2-g0": {"key": "s2-g0", "label": "Introduction", "domain": "role", "desc": "Machine learning is about creating computer programs that can learn from data. Instead of being explicitly programmed to perform a task, these programs improve their performance on a specific task as they are exposed to more data. This learning process allows them to make predictions or decisions without being directly told how to do so.", "links": [{"type": "article", "title": "What is Machine Learning?", "url": "https://www.ibm.com/topics/machine-learning"}, {"type": "video", "title": "What is Machine Learning?", "url": "https://www.youtube.com/watch?v=9gGnTQTYNaE"}], "col": 2, "subs": ["s2-g0-l0", "s2-g0-l1", "s2-g0-l2"]}, "s3-g0": {"key": "s3-g0", "label": "Data Sources", "domain": "data", "desc": "Sources of data are origins or locations from which data is collected, categorized as primary (direct, firsthand information) or secondary (collected by others). Common primary sources include surveys, interviews, experiments, and sensor data. Secondary sources encompass databases, published reports, government data, books, articles, and web data like social media posts. Data sources can also be classified as internal (within an organization) or external (from outside sources).", "links": [], "col": 2, "subs": []}, "s3-g1": {"key": "s3-g1", "label": "Data Formats", "domain": "data", "desc": "Data formats define the structure in which data is organized and stored. These formats dictate how information is encoded, allowing computers to interpret and process it effectively. Common examples include CSV (Comma Separated Values) for tabular data, JSON (JavaScript Object Notation) for structured data with key-value pairs, and image formats like JPEG and PNG for visual data. The choice of data format impacts storage efficiency, data accessibility, and the compatibility with different machine learning tools and algorithms.", "links": [], "col": 2, "subs": ["s3-g1-l0", "s3-g1-l1", "s3-g1-l2", "s3-g1-l3", "s3-g1-l4"]}, "s4-g0": {"key": "s4-g0", "label": "Preprocessing Techniques", "domain": "data", "desc": "Preprocessing techniques in data cleaning involve transforming raw data into a more suitable format for machine learning models. This often includes handling missing values by either imputing them with estimated values or removing rows/columns containing them. It also encompasses scaling numerical features to a similar range to prevent features with larger values from dominating the model, and encoding categorical features into numerical representations that algorithms can understand. These steps aim to improve the quality and consistency of the data, leading to better model performance.", "links": [{"type": "article", "title": "Data Preprocessing: A Complete Guide with Python Examples", "url": "https://www.datacamp.com/blog/data-preprocessing"}, {"type": "video", "title": "16 Data Pre Processing Techniques in 20 Minutes | Data Preprocessing in machine learning", "url": "https://www.youtube.com/watch?v=oggHzC_L9uc"}], "col": 2, "subs": ["s4-g0-l0", "s4-g0-l1", "s4-g0-l2", "s4-g0-l3", "s4-g0-l4"]}, "s5-g0": {"key": "s5-g0", "label": "What is Machine Learning?", "domain": "coreml", "desc": "Machine learning is a field of computer science that focuses on enabling computers to learn from data without being explicitly programmed. Instead of relying on pre-defined rules, machine learning algorithms identify patterns, make predictions, and improve their performance over time as they are exposed to more data. This learning process allows machines to adapt to new situations and solve complex problems that are difficult or impossible to address with traditional programming techniques.", "links": [{"type": "book", "title": "Machine Learning: The Basics", "url": "https://alexjungaalto.github.io/MLBasicsBook.pdf"}, {"type": "article", "title": "What is Machine Learning (ML)?", "url": "https://www.ibm.com/topics/machine-learning"}, {"type": "video", "title": "What is Machine Learning?", "url": "https://www.youtube.com/watch?v=9gGnTQTYNaE"}, {"type": "video", "title": "Complete Machine Learning in One Video | Machine Learning Tutorial For Beginners 2025 | Simplilearn", "url": "https://www.youtube.com/watch?v=PtYRUoJRE9s"}], "col": 3, "subs": []}, "s5-g1": {"key": "s5-g1", "label": "Types of Machine Learning", "domain": "coreml", "desc": "Machine learning algorithms learn from data to make predictions or decisions. These algorithms are broadly categorized into supervised, unsupervised, and reinforcement learning. Supervised learning uses labeled data to train a model to map inputs to outputs. Unsupervised learning, on the other hand, works with unlabeled data to discover hidden patterns and structures. Reinforcement learning involves training an agent to make decisions in an environment to maximize a reward. More recently, semi-supervised learning, which uses a combination of labeled and unlabeled data, and self-supervised learning, where the data itself provides the supervision signal, have gained prominence.", "links": [{"type": "article", "title": "5 types of machine learning", "url": "https://lumenalta.com/insights/5-types-of-machine-learning"}], "col": 3, "subs": ["s5-g1-l0", "s5-g1-l1", "s5-g1-l2", "s5-g1-l3", "s5-g1-l4"]}, "s6-g0": {"key": "s6-g0", "label": "Scikit-learn", "domain": "tool", "desc": "Scikit-learn is a free and open-source Python library that provides simple and efficient tools for data analysis and machine learning. It features various algorithms for classification, regression, clustering, dimensionality reduction, model selection, and preprocessing. It's built on NumPy, SciPy, and matplotlib, making it easy to integrate with other scientific Python libraries.", "links": [{"type": "official", "title": "scikit-learn: machine learning in Python", "url": "https://scikit-learn.org/"}, {"type": "opensource", "title": "scikit-learn", "url": "https://github.com/scikit-learn/scikit-learn"}, {"type": "video", "title": "Scikit-learn Crash Course - Machine Learning Library for Python", "url": "https://www.youtube.com/watch?v=0B5eIE_1vpU"}], "col": 3, "subs": ["s6-g0-l0", "s6-g0-l1", "s6-g0-l2", "s6-g0-l3", "s6-g0-l4", "s6-g0-l5"]}, "s7-g0": {"key": "s7-g0", "label": "What is Supervised Learning?", "domain": "coreml", "desc": "Supervised learning is a type of machine learning where an algorithm learns from a labeled dataset. This means that each data point in the dataset is paired with a corresponding correct output, or \"label.\" The algorithm's goal is to learn a function that maps inputs to outputs, so that when given new, unseen inputs, it can predict the correct output based on the patterns it learned from the labeled data.", "links": [{"type": "article", "title": "What is Supervised Learning?", "url": "https://cloud.google.com/discover/what-is-supervised-learning"}, {"type": "article", "title": "Supervised Machine Learning", "url": "https://www.datacamp.com/blog/supervised-machine-learning"}, {"type": "video", "title": "Supervised Machine Learning Explained For Beginners", "url": "https://www.youtube.com/watch?v=Mu3POlNoLdc"}], "col": 3, "subs": []}, "s7-g1": {"key": "s7-g1", "label": "Classification", "domain": "coreml", "desc": "Classification is a type of supervised learning where the goal is to assign data points to predefined categories or classes. Given a set of labeled data (where each data point has a known class), the algorithm learns a mapping function that can predict the class label for new, unseen data. The output is a discrete value representing the predicted class.", "links": [{"type": "course", "title": "Classification - Google Crash Course", "url": "https://developers.google.com/machine-learning/crash-course/classification"}, {"type": "article", "title": "What is Classification in Machine Learning?", "url": "https://www.ibm.com/think/topics/classification-machine-learning"}, {"type": "article", "title": "Classification in Machine Learning: A Guide for Beginners", "url": "https://www.datacamp.com/blog/classification-machine-learning"}], "col": 4, "subs": ["s7-g1-l0", "s7-g1-l1", "s7-g1-l2", "s7-g1-l3", "s7-g1-l4"]}, "s7-g2": {"key": "s7-g2", "label": "Regression", "domain": "coreml", "desc": "Regression in supervised learning is a method used to predict a continuous numerical value. It works by finding the relationship between input features (independent variables) and a target variable (dependent variable). The goal is to build a model that can accurately estimate the target variable's value based on the given input features. For example, predicting house prices based on size and location is a regression problem.", "links": [], "col": 4, "subs": ["s7-g2-l0", "s7-g2-l1", "s7-g2-l2", "s7-g2-l3", "s7-g2-l4"]}, "s8-g0": {"key": "s8-g0", "label": "What is Unsupervised Learning?", "domain": "coreml", "desc": "Unsupervised learning is a type of machine learning where the algorithm learns patterns from unlabeled data. Unlike supervised learning, there are no pre-defined correct answers or target variables provided to guide the learning process. Instead, the algorithm explores the data to discover hidden structures, relationships, and groupings on its own. Common tasks in unsupervised learning include clustering, dimensionality reduction, and anomaly detection.", "links": [{"type": "article", "title": "What is Unsupervised Learning?", "url": "https://cloud.google.com/discover/what-is-unsupervised-learning"}, {"type": "article", "title": "Introduction to Unsupervised Learning", "url": "https://www.datacamp.com/blog/introduction-to-unsupervised-learning"}, {"type": "video", "title": "Unsupervised Machine Learning Explained For Beginners", "url": "https://www.youtube.com/watch?v=yteYU_QpUxs"}], "col": 3, "subs": []}, "s8-g1": {"key": "s8-g1", "label": "Clustering", "domain": "coreml", "desc": "Clustering is a way to automatically group similar data points together. Imagine you have a bunch of scattered objects and you want to organize them into piles based on how alike they are. Clustering algorithms do this by finding patterns in the data, grouping data points that are close to each other in some way, and separating them from data points that are further apart. The algorithm decides which data points belong to which group, without you telling it what the groups should be beforehand.", "links": [{"type": "article", "title": "Clustering | scikit-learn", "url": "https://scikit-learn.org/stable/modules/clustering.html"}, {"type": "article", "title": "What is clustering?", "url": "https://developers.google.com/machine-learning/clustering/overview"}], "col": 4, "subs": ["s8-g1-l0", "s8-g1-l1", "s8-g1-l2", "s8-g1-l3"]}, "s8-g2": {"key": "s8-g2", "label": "Dimensionality Reduction", "domain": "coreml", "desc": "Dimensionality reduction is the process of reducing the number of random variables under consideration by obtaining a set of principal variables. It can be divided into feature selection and feature extraction. Feature selection selects a subset of the original features, while feature extraction transforms the data into a lower-dimensional space. The goal is to simplify the data without losing important information, making it easier to analyze and model.", "links": [{"type": "article", "title": "What is Dimensionality Reduction?", "url": "https://www.ibm.com/think/topics/dimensionality-reduction"}, {"type": "video", "title": "Machine Learning - Dimensionality Reduction", "url": "https://www.youtube.com/watch?v=AU_hBML2H1c"}], "col": 4, "subs": ["s8-g2-l0", "s8-g2-l1"]}, "s9-g0": {"key": "s9-g0", "label": "What is Reinforcement Learning?", "domain": "coreml", "desc": "Reinforcement learning is a type of machine learning where an agent learns to make decisions in an environment to maximize a reward. The agent interacts with the environment, takes actions, and receives feedback in the form of rewards or penalties. Through trial and error, the agent learns a policy that maps states to actions, aiming to accumulate the most reward over time.", "links": [{"type": "article", "title": "What is reinforcement learning?", "url": "https://online.york.ac.uk/resources/what-is-reinforcement-learning/"}, {"type": "article", "title": "Resources to Learn Reinforcement Learning", "url": "https://towardsdatascience.com/best-free-courses-and-resources-to-learn-reinforcement-learning-ed6633608cb2/"}, {"type": "article", "title": "https://huggingface.co/learn/deep-rl-course/unit0/introduction", "url": "https://huggingface.co/learn/deep-rl-course/unit0/introduction"}, {"type": "video", "title": "Reinforcement Learning in 3 Hours | Full Course using Python", "url": "https://www.youtube.com/watch?v=Mut_u40Sqz4"}], "col": 3, "subs": ["s9-g0-l0", "s9-g0-l1", "s9-g0-l2", "s9-g0-l3"]}, "s10-g0": {"key": "s10-g0", "label": "What is Model Evaluation?", "domain": "coreml", "desc": "Model evaluation is the process of assessing how well a machine learning model performs on a given dataset. It involves using various metrics and techniques to quantify the model's accuracy, reliability, and generalization ability. This helps determine if the model is suitable for deployment and whether further improvements are needed.", "links": [], "col": 5, "subs": []}, "s10-g1": {"key": "s10-g1", "label": "Why is it important?", "domain": "coreml", "desc": "Model evaluation is the process of assessing how well a machine learning model performs on a given dataset. It involves using various metrics and techniques to quantify the model's accuracy, reliability, and generalization ability. This assessment helps determine if the model is suitable for deployment and provides insights into areas where it can be improved.", "links": [], "col": 5, "subs": []}, "s10-g2": {"key": "s10-g2", "label": "Metrics to Evaluate", "domain": "coreml", "desc": "Model evaluation metrics are quantitative measures used to assess the performance of a machine learning model. These metrics provide insights into how well the model is generalizing to unseen data and help in comparing different models or tuning hyperparameters. They quantify various aspects of model behavior, such as accuracy, precision, recall, and error rate, allowing data scientists to make informed decisions about model selection and deployment.", "links": [{"type": "article", "title": "Metrics and scoring: quantifying the quality of predictions | scikit-learn", "url": "https://scikit-learn.org/stable/modules/model_evaluation.html"}], "col": 5, "subs": ["s10-g2-l0", "s10-g2-l1", "s10-g2-l2", "s10-g2-l3", "s10-g2-l4", "s10-g2-l5", "s10-g2-l6"]}, "s10-g3": {"key": "s10-g3", "label": "Validation Techniques", "domain": "coreml", "desc": "Validation techniques are methods used to estimate how well a machine learning model will generalize to unseen data. They involve splitting the available data into different subsets: a training set used to train the model, and a validation set used to evaluate the model's performance during training or hyperparameter tuning. By assessing the model on data it hasn't seen before, validation techniques help to identify issues like overfitting and underfitting, and ultimately guide the selection of the best model for a given task.", "links": [{"type": "article", "title": "Cross-validation: evaluating estimator performance | scikit-learn", "url": "https://scikit-learn.org/stable/modules/cross_validation.html"}, {"type": "article", "title": "The 5 Stages of Machine Learning Validation", "url": "https://towardsdatascience.com/the-5-stages-of-machine-learning-validation-162193f8e5db/"}, {"type": "article", "title": "What is the Difference Between Test and Validation Datasets?", "url": "https://machinelearningmastery.com/difference-test-validation-datasets/"}, {"type": "video", "title": "Validating Machine Learning Model and Avoiding Common Challenges", "url": "https://www.youtube.com/watch?v=TnIh2b2Rw6%5D(https://www.youtube.com/watch?v=TnIh2b2Rw6Y"}], "col": 5, "subs": ["s10-g3-l0", "s10-g3-l1"]}, "s11-g0": {"key": "s11-g0", "label": "Neural Network (NN) Basics", "domain": "deep", "desc": "A neural network is a computational model inspired by the structure and function of biological neural networks. It consists of interconnected nodes, called neurons, organized in layers. These neurons process and transmit signals, learning complex patterns from data through adjusting the strengths of the connections (weights) between them.", "links": [{"type": "course", "title": "Practical Deep Learning", "url": "https://course.fast.ai/"}, {"type": "video", "title": "Neural Networks Explained in 5 minutes", "url": "https://www.youtube.com/watch?v=jmmW0F0biz0"}], "col": 6, "subs": ["s11-g0-l0", "s11-g0-l1", "s11-g0-l2", "s11-g0-l3", "s11-g0-l4"]}, "s11-g1": {"key": "s11-g1", "label": "Deep Learning Libraries", "domain": "deep", "desc": "Deep learning relies heavily on specialized Python libraries that provide pre-built functions and tools for building and training neural networks. TensorFlow, developed by Google, is a widely used library known for its flexibility and scalability. PyTorch, created by Facebook, is another popular choice, favored for its dynamic computation graph and ease of use, especially in research. Keras acts as a high-level API that can run on top of TensorFlow or other backends, simplifying the process of building complex models. These libraries offer functionalities like automatic differentiation, GPU acceleration, and pre-trained models, making deep learning more accessible and efficient.", "links": [], "col": 6, "subs": ["s11-g1-l0", "s11-g1-l1", "s11-g1-l2", "s11-g1-l3"]}, "s11-g2": {"key": "s11-g2", "label": "Convolutional Neural Network", "domain": "deep", "desc": "Convolutional Neural Networks (CNNs) are a specialized type of artificial neural network primarily used for processing data that has a grid-like topology, such as images. They employ convolutional layers to automatically and adaptively learn spatial hierarchies of features from the input data. These layers use filters (or kernels) that slide across the input, performing element-wise multiplication and summation to detect patterns. Pooling layers are often used to reduce the spatial dimensions of the feature maps, decreasing computational complexity and making the network more robust to variations in the input.", "links": [{"type": "article", "title": "What are Convolutional Neural Networks?", "url": "https://www.ibm.com/think/topics/convolutional-neural-networks"}, {"type": "article", "title": "An Introduction to Convolutional Neural Networks (CNNs)", "url": "https://www.datacamp.com/tutorial/introduction-to-convolutional-neural-networks-cnns"}, {"type": "video", "title": "Hot Dog or Not Hot Dog – Convolutional Neural Network Course for Beginners", "url": "https://www.youtube.com/watch?v=nVhau51w6dM"}], "col": 6, "subs": ["s11-g2-l0", "s11-g2-l1", "s11-g2-l2", "s11-g2-l3"]}, "s11-g3": {"key": "s11-g3", "label": "Applications of CNNs", "domain": "deep", "desc": "CNNs have revolutionized the field of computer vision, leading to significant advancements in many real-world applications. Thanks to their power to solve complex problems like image classification, object detection, and facial recognition, CNNs power many applications we use daily, like automatically tagging friends in photos, enabling self-driving cars to \"see\" and understand their surroundings, and helping doctors diagnose diseases from medical scans. They are also used to generate realistic images, translate languages, and even create art.", "links": [{"type": "article", "title": "Top 10 Real-World Applications of Convolutional Neural Networks", "url": "https://thedatascientist.com/top-10-real-world-applications-of-convolutional-neural-networks-in-2025/"}], "col": 6, "subs": ["s11-g3-l0", "s11-g3-l1", "s11-g3-l2", "s11-g3-l3"]}, "s11-g4": {"key": "s11-g4", "label": "Recurrent Neural Networks", "domain": "deep", "desc": "Recurrent Neural Networks (RNNs) are a type of neural network designed to process sequential data, where the order of the inputs matters. Unlike traditional feedforward networks that treat each input independently, RNNs have a \"memory\" that allows them to consider previous inputs when processing new ones. This memory is implemented through recurrent connections, which feed the output of a neuron back into itself or other neurons in the network, enabling the network to learn patterns and dependencies across time or sequence steps.", "links": [{"type": "article", "title": "What is a Recurrent Neural Network (RNN)?", "url": "https://www.ibm.com/think/topics/recurrent-neural-networks"}, {"type": "article", "title": "What is RNN? - Recurrent Neural Networks Explained", "url": "https://aws.amazon.com/what-is/recurrent-neural-network/"}, {"type": "video", "title": "Recurrent Neural Networks (RNNs), Clearly Explained", "url": "https://www.youtube.com/watch?v=AsNTP8Kwu80"}], "col": 6, "subs": ["s11-g4-l0", "s11-g4-l1", "s11-g4-l2"]}, "s11-g5": {"key": "s11-g5", "label": "Attention Mechanisms", "domain": "deep", "desc": "Developed by Google researchers, the attention mechanisms allow a neural network to focus on the most relevant parts of the input data when making predictions. Instead of processing the entire input uniformly, attention mechanisms assign weights to different parts of the input, indicating their importance. These weights are then used to create a weighted average of the input, which is used for further processing. This allows the model to selectively attend to the most informative parts of the input, improving performance, especially in tasks involving sequential data like text or images.", "links": [{"type": "article", "title": "Attention Is All You Need", "url": "https://arxiv.org/abs/1706.03762"}, {"type": "article", "title": "What is an attention mechanism?", "url": "https://www.ibm.com/think/topics/attention-mechanism"}, {"type": "video", "title": "Attention mechanism: Overview", "url": "https://www.youtube.com/watch?v=fjJOgb-E41w"}], "col": 6, "subs": ["s11-g5-l0", "s11-g5-l1", "s11-g5-l2"]}, "s12-g0": {"key": "s12-g0", "label": "Autoencoders", "domain": "adv", "desc": "Autoencoders are a type of neural network used for unsupervised learning. They work by compressing the input data into a lower-dimensional representation (encoding) and then reconstructing the original input from this compressed representation (decoding). The network is trained to minimize the difference between the original input and the reconstructed output, forcing it to learn efficient and meaningful representations of the data.", "links": [{"type": "article", "title": "What is an autoencoder? | IBM", "url": "https://www.ibm.com/think/topics/autoencoder"}, {"type": "article", "title": "Intro to Autoencoders | TensorFLow", "url": "https://www.tensorflow.org/tutorials/generative/autoencoder"}, {"type": "video", "title": "Autoencoders", "url": "https://www.youtube.com/watch?v=hZ4a4NgM3u0"}], "col": 7, "subs": []}, "s12-g1": {"key": "s12-g1", "label": "Generative Adversarial Networks", "domain": "adv", "desc": "Generative Adversarial Networks (GANs) are a type of neural network architecture designed to generate new data that resembles the data they were trained on. They consist of two networks: a generator, which creates new data instances, and a discriminator, which evaluates the authenticity of the generated data. These two networks are trained in an adversarial process, where the generator tries to fool the discriminator, and the discriminator tries to distinguish between real and generated data. This competition drives both networks to improve, ultimately leading the generator to produce highly realistic data.", "links": [{"type": "course", "title": "GANs | Google", "url": "https://developers.google.com/machine-learning/gan"}, {"type": "article", "title": "What is a GAN? | AWS", "url": "https://aws.amazon.com/what-is/gan/"}, {"type": "article", "title": "Generative Adversarial Networks | HuggingFace", "url": "https://huggingface.co/learn/computer-vision-course/en/unit5/generative-models/gans"}, {"type": "video", "title": "What are GANs (Generative Adversarial Networks)?", "url": "https://www.youtube.com/watch?v=TpMIssRdhco"}], "col": 7, "subs": []}, "s12-g2": {"key": "s12-g2", "label": "Explainable AI", "domain": "adv", "desc": "Explainable AI (XAI) focuses on making machine learning models and their decisions understandable to humans. Instead of treating models as black boxes, XAI aims to provide insights into how a model arrives at a particular prediction or decision. This involves developing techniques that allow us to interpret the model's internal logic, identify the factors that influence its outputs, and assess its reliability and potential biases.", "links": [{"type": "article", "title": "What is Explainable AI (XAI)?", "url": "https://www.ibm.com/think/topics/explainable-ai"}, {"type": "article", "title": "Explainable AI (XAI) | Giskard", "url": "https://www.giskard.ai/glossary/explainable-ai-xai"}, {"type": "video", "title": "Explainable AI: Demystifying AI Agents Decision-Making", "url": "https://www.youtube.com/watch?v=yJkCuEu3K68"}], "col": 7, "subs": []}, "s12-g3": {"key": "s12-g3", "label": "Natural Language Processing", "domain": "adv", "desc": "Natural Language Processing (NLP) is a field focused on enabling computers to understand, interpret, and generate human language. It bridges the gap between human communication and computer understanding by developing algorithms and models that can process and analyze text and speech data. This allows machines to perform tasks like translation, sentiment analysis, and text summarization.", "links": [{"type": "book", "title": "Natural Language Processing with Python", "url": "https://tjzhifei.github.io/resources/NLTK.pdf"}, {"type": "article", "title": "Natural Language Processing", "url": "https://www.deeplearning.ai/resources/natural-language-processing/"}, {"type": "article", "title": "What is Natural Language Processing (NLP)? | AWS", "url": "https://aws.amazon.com/what-is/nlp/"}, {"type": "video", "title": "Stanford’s Natural Language Processing with Deep Learning", "url": "https://www.youtube.com/playlist?list=PLoROMvodv4rMFqRtEuo6SGjY4XbRIVRd4"}], "col": 7, "subs": ["s12-g3-l0", "s12-g3-l1", "s12-g3-l2", "s12-g3-l3", "s12-g3-l4"]}}, "leaves": {"s0-g0-l0": {"key": "s0-g0-l0", "label": "Derivatives, Partial Derivatives", "parent": "s0-g0", "desc": "A derivative measures how a function changes as its input changes. Imagine a curve on a graph; the derivative at a specific point tells you the slope of the line tangent to that curve at that point. When dealing with functions of multiple variables, we use partial derivatives. A partial derivative measures how a function changes with respect to one specific variable, while holding all other variables constant.", "links": [{"type": "article", "title": "Derivatives", "url": "https://en.wikipedia.org/wiki/Derivative"}, {"type": "video", "title": "What is a Derivative? Deriving the Power Rule", "url": "https://www.youtube.com/watch?v=x3iEEDxrhyE"}], "domain": "math"}, "s0-g0-l1": {"key": "s0-g0-l1", "label": "Chain rule of derivation", "parent": "s0-g0", "desc": "The chain rule is a formula for finding the derivative of a composite function. If you have a function that's made up of one function inside another (like sin(x²) ), the chain rule lets you break down the differentiation process. It states that the derivative of the composite function is the derivative of the outer function evaluated at the inner function, multiplied by the derivative of the inner function.", "links": [{"type": "article", "title": "Chain rule", "url": "https://en.wikipedia.org/wiki/Chain_rule"}, {"type": "video", "title": "Derivatives of Composite Functions: The Chain Rule", "url": "https://www.youtube.com/watch?v=_x1nCg2LfuA"}], "domain": "math"}, "s0-g0-l2": {"key": "s0-g0-l2", "label": "Gradient, Jacobian, Hessian", "parent": "s0-g0", "desc": "The gradient, Jacobian, and Hessian are fundamental tools from calculus used to analyze and optimize functions, especially in the context of machine learning. The gradient of a scalar-valued function of multiple variables is a vector containing the partial derivatives with respect to each variable, indicating the direction of the steepest ascent. The Jacobian matrix generalizes the gradient to vector-valued functions of multiple variables, containing all the partial derivatives of each output component with respect to each input variable. The Hessian matrix, on the other hand, is the square matrix of second-order partial derivatives of a scalar-valued function, providing information about the local curvature of the function.", "links": [{"type": "article", "title": "Vector Calculus: Understanding the Gradient", "url": "https://betterexplained.com/articles/vector-calculus-understanding-the-gradient/"}, {"type": "article", "title": "A Gentle Introduction to the Jacobian", "url": "https://machinelearningmastery.com/a-gentle-introduction-to-the-jacobian/"}, {"type": "article", "title": "A Gentle Introduction To Hessian Matrices", "url": "https://www.machinelearningmastery.com/a-gentle-introduction-to-hessian-matrices/"}, {"type": "video", "title": "Partial Derivatives and the Gradient of a Function", "url": "https://www.youtube.com/watch?v=AXH9Xm6Rbfc&t=320s&pp=ygURZ3JhZGllbnQgY2FsY3VsdXM%3D"}, {"type": "video", "title": "Change of Variables and the Jacobian", "url": "https://www.youtube.com/watch?v=hhFzJvaY__U"}, {"type": "video", "title": "Multivariable Calculus: Lecture 3 Hessian Matrix : Optimization for a three variable function", "url": "https://www.youtube.com/watch?v=zomvvohLwr4"}], "domain": "math"}, "s0-g1-l0": {"key": "s0-g1-l0", "label": "Matrix & Matrix Operations", "parent": "s0-g1", "desc": "A matrix is a rectangular array of numbers, symbols, or expressions, arranged in rows and columns. Matrix operations are the rules and procedures for manipulating these matrices. These operations include addition, subtraction, multiplication, transposition (flipping rows and columns), and finding the inverse of a matrix, each with specific rules about the dimensions of the matrices involved.", "links": [{"type": "article", "title": "Matrix (mathematics)", "url": "https://en.wikipedia.org/wiki/Matrix_(mathematics"}, {"type": "video", "title": "Linear Algebra - Matrix Operations", "url": "https://www.youtube.com/watch?v=p48uw2vFWQs"}], "domain": "math"}, "s0-g1-l1": {"key": "s0-g1-l1", "label": "Scalars, Vectors, Tensors", "parent": "s0-g1", "desc": "Scalars, vectors, and tensors are fundamental building blocks for representing data in machine learning. A scalar is a single numerical value, like a temperature reading. A vector is an ordered array of numbers, representing a point in space or a feature set for a single data instance. A tensor is a generalization of vectors and matrices to higher dimensions; it can be thought of as a multi-dimensional array, useful for representing images, videos, or complex datasets with multiple features and relationships.", "links": [{"type": "article", "title": "From Vectors to Tensors: Exploring the Mathematics of Tensor Algebra", "url": "https://towardsdatascience.com/what-are-tensors-in-machine-learning-5671814646ff/"}, {"type": "article", "title": "Scalar, Vector, Tensor", "url": "https://e-magnetica.pl/doku.php/scalar_vector_tensor"}, {"type": "video", "title": "What the HECK is a Tensor?!?", "url": "https://www.youtube.com/watch?v=bpG3gqDM80w"}], "domain": "math"}, "s0-g1-l2": {"key": "s0-g1-l2", "label": "Singular Value Decomposition", "parent": "s0-g1", "desc": "Singular Value Decomposition (SVD) is a matrix factorization technique that decomposes a rectangular matrix into three other matrices: a unitary matrix, a diagonal matrix of singular values, and another unitary matrix. This decomposition reveals the underlying structure of the original matrix, highlighting its principal components and allowing for dimensionality reduction and noise removal. Essentially, SVD breaks down a complex matrix into simpler, more manageable components that capture the most important information.", "links": [{"type": "book", "title": "Singular Value Decomposition", "url": "https://www.cs.cmu.edu/~venkatg/teaching/CStheory-infoage/book-chapter-4.pdf"}, {"type": "article", "title": "Singular Value Decomposition", "url": "https://en.wikipedia.org/wiki/Singular_value_decomposition"}, {"type": "video", "title": "Singular Value Decomposition (SVD): Overview", "url": "https://www.youtube.com/watch?v=gXbThCXjZFM"}], "domain": "math"}, "s0-g1-l3": {"key": "s0-g1-l3", "label": "Determinants, inverse of Matrix", "parent": "s0-g1", "desc": "A determinant is a scalar value that can be computed from the elements of a square matrix and encodes certain properties of the linear transformation described by the matrix. The inverse of a matrix, denoted as A⁻¹, is another matrix that, when multiplied by the original matrix A, results in the identity matrix. The inverse exists only for square matrices with a non-zero determinant, making the matrix invertible.", "links": [{"type": "article", "title": "Determinant of a Matrix", "url": "https://www.mathsisfun.com/algebra/matrix-determinant.html"}, {"type": "article", "title": "Inverse of a Matrix", "url": "https://www.mathsisfun.com/algebra/matrix-inverse.html"}, {"type": "video", "title": "Determinant of a Matrix", "url": "https://www.youtube.com/watch?v=CcbyMH3Noow"}, {"type": "video", "title": "Inverse Matrices and Their Properties", "url": "https://www.youtube.com/watch?v=kWorj5BBy9k"}], "domain": "math"}, "s0-g1-l4": {"key": "s0-g1-l4", "label": "Eigenvalues, Diagonalization", "parent": "s0-g1", "desc": "Eigenvalues are special numbers associated with a square matrix that, when multiplied by a corresponding eigenvector, result in the same vector scaled by that eigenvalue. Diagonalization is the process of transforming a square matrix into a diagonal matrix, where all off-diagonal elements are zero, using its eigenvectors and eigenvalues. This transformation simplifies many matrix operations and provides insights into the matrix's properties.", "links": [{"type": "article", "title": "Eigenvalues and eigenvectors", "url": "https://en.wikipedia.org/wiki/Eigenvalues_and_eigenvectors"}, {"type": "article", "title": "Matrix Diagonalization", "url": "https://www.statlect.com/matrix-algebra/matrix-diagonalization"}, {"type": "video", "title": "Finding Eigenvalues and Eigenvectors", "url": "https://www.youtube.com/watch?v=TQvxWaQnrqI"}, {"type": "video", "title": "Diagonalization", "url": "https://www.youtube.com/watch?v=WTLl03D4TNA"}], "domain": "math"}, "s0-g3-l0": {"key": "s0-g3-l0", "label": "Basics of Probability", "parent": "s0-g3", "desc": "Probability is a way to quantify the likelihood of an event occurring. It provides a numerical measure, ranging from 0 to 1, representing the chance that a specific outcome will happen. A probability of 0 indicates impossibility, while a probability of 1 signifies certainty. Understanding probability involves concepts like random variables, probability distributions, and events, which are essential for making predictions and decisions under uncertainty.", "links": [{"type": "book", "title": "Probability and Statistics: The Science of Uncertainty", "url": "https://utstat.utoronto.ca/mikevans/jeffrosenthal/book.pdf"}, {"type": "article", "title": "Probability", "url": "https://en.wikipedia.org/wiki/Probability"}, {"type": "article", "title": "Probability", "url": "https://www.mathsisfun.com/data/probability.html"}, {"type": "video", "title": "Probability Bootcamp", "url": "https://www.youtube.com/playlist?list=PLMrJAkhIeNNR3sNYvfgiKgcStwuPSts9V"}], "domain": "math"}, "s0-g3-l1": {"key": "s0-g3-l1", "label": "Bayes Theorem", "parent": "s0-g3", "desc": "Bayes' Theorem is a mathematical formula that describes how to update the probability of a hypothesis based on new evidence. It essentially calculates the probability of an event occurring given that another event has already occurred. The theorem uses prior knowledge of conditions related to the event to refine the probability estimate as new information becomes available.", "links": [{"type": "article", "title": "Bayes' Theorem: What It Is, Formula, and Examples", "url": "https://www.investopedia.com/terms/b/bayes-theorem.asp"}, {"type": "article", "title": "Bayes' Theorem", "url": "https://www.mathsisfun.com/data/bayes-theorem.html"}, {"type": "video", "title": "Bayes' Theorem EXPLAINED with Examples", "url": "https://www.youtube.com/watch?v=cqTwHnNbc8g"}], "domain": "math"}, "s0-g3-l2": {"key": "s0-g3-l2", "label": "Random Variances, PDFs", "parent": "s0-g3", "desc": "A random variable is a variable whose value is a numerical outcome of a random phenomenon. It can be discrete (taking on a finite or countably infinite number of values) or continuous (taking on any value within a given range).\n\nThe probability density function (PDF) describes the relative likelihood for a continuous random variable to take on a given value. It's important to note that the value of the PDF at any given point is not a probability itself, but rather the area under the PDF curve over a given interval represents the probability of the random variable falling within that interval.", "links": [{"type": "article", "title": "Random Variable: What is it in Statistics?", "url": "https://www.statisticshowto.com/random-variable/"}, {"type": "article", "title": "The Basics of Probability Density Function (PDF), With an Example", "url": "https://www.investopedia.com/terms/p/pdf.asp"}, {"type": "video", "title": "Sample Variance in Random Population Sampling", "url": "https://www.youtube.com/watch?v=yNnUVHfX5yQ"}], "domain": "math"}, "s0-g3-l3": {"key": "s0-g3-l3", "label": "Types of Distribution", "parent": "s0-g3", "desc": "A distribution describes how data is spread or arranged across its possible values. It provides a way to understand the probability of different outcomes occurring within a dataset. Different types of distributions, like normal, uniform, or binomial, each have unique characteristics that determine the likelihood of observing specific values. Understanding these distributions is essential for summarizing data, making predictions, and performing statistical inference.", "links": [{"type": "article", "title": "Probability Distribution | Formula, Types, & Examples", "url": "https://www.scribbr.com/statistics/probability-distributions/"}, {"type": "article", "title": "List of probability distributions", "url": "https://en.wikipedia.org/wiki/List_of_probability_distributions"}, {"type": "video", "title": "Probability: Types of Distributions", "url": "https://www.youtube.com/watch?v=b9a27XN_6tg"}], "domain": "math"}, "s0-g3-l4": {"key": "s0-g3-l4", "label": "Descriptive Statistics", "parent": "s0-g3", "desc": "Descriptive statistics involves methods for summarizing and organizing data in a meaningful way. It focuses on describing the main features of a dataset using measures like mean, median, mode, standard deviation, and range. These techniques help to understand the central tendency, variability, and distribution of the data without making inferences beyond the specific dataset.", "links": [{"type": "article", "title": "Descriptive Statistics: Definition, Overview, Types, and Examples", "url": "https://www.investopedia.com/terms/d/descriptive_statistics.asp"}, {"type": "article", "title": "Descriptive Statistics | Definitions, Types, Examples", "url": "https://www.scribbr.com/statistics/descriptive-statistics/"}], "domain": "math"}, "s0-g3-l5": {"key": "s0-g3-l5", "label": "Inferential Statistics", "parent": "s0-g3", "desc": "Inferential statistics uses sample data to make inferences or predictions about a larger population. Instead of examining the entire population, which is often impractical or impossible, we analyze a representative subset (the sample) and then use statistical methods to draw conclusions about the characteristics of the whole population. This involves estimating population parameters (like the mean or proportion) and testing hypotheses about these parameters based on the sample data.", "links": [{"type": "article", "title": "Inferential Statistics | An Easy Introduction & Examples", "url": "https://www.scribbr.com/statistics/inferential-statistics/"}], "domain": "math"}, "s0-g3-l6": {"key": "s0-g3-l6", "label": "Basic concepts", "parent": "s0-g3", "desc": "Statistics is the science of collecting, analyzing, interpreting, and presenting data. It provides the foundation for understanding patterns and making inferences from data, which is crucial for machine learning algorithms. Here are 10 basic statistical concepts:\n\n*   **Mean:** The average value of a dataset, calculated by summing all values and dividing by the number of values.\n*   **Median:** The middle value in a sorted dataset.\n*   **Mode:** The value that appears most frequently in a dataset.\n*   **Standard Deviation:** A measure of the spread or dispersion of data points around the mean.\n*   **Variance:** The square of the standard deviation, representing the average squared difference from the mean.\n*   **Probability:** The likelihood of an event occurring, expressed as a number between 0 and 1.\n*   **Distributions:** A function that shows the possible values for a variable and how often they occur (e.g., normal distribution, uniform distribution).\n*   **Hypothesis Testing:** A method for testing a claim or hypothesis about a population based on a sample of data.\n*   **Correlation:** A statistical measure that describes the extent to which two variables are related.\n*   **Regression:** A statistical method for modeling the relationship between a dependent variable and one or more independent variables.", "links": [], "domain": "math"}, "s0-g3-l7": {"key": "s0-g3-l7", "label": "Graphs & Charts", "parent": "s0-g3", "desc": "Graphs and charts are visual representations of data. They use symbols like bars, lines, and slices to display patterns, trends, and relationships within datasets. These visual tools help in understanding complex information quickly and making data more accessible and interpretable.", "links": [{"type": "article", "title": "What is Data Visualization?", "url": "https://www.ibm.com/think/topics/data-visualization"}], "domain": "math"}, "s1-g1-l0": {"key": "s1-g1-l0", "label": "Variables and Data Types", "parent": "s1-g1", "desc": "Variables are named storage locations in a computer's memory used to hold data. Data types classify the kind of value a variable can hold, such as numbers (integers, decimals), text (strings), or boolean values (true/false). Understanding variables and data types is fundamental to writing any program, as it dictates how data is stored, manipulated, and used within the code.", "links": [{"type": "article", "title": "Variables in Python", "url": "https://realpython.com/python-variables"}, {"type": "article", "title": "Python for Beginners: Data Types", "url": "https://thenewstack.io/python-for-beginners-data-types/"}, {"type": "video", "title": "Python Variables and Data Types", "url": "https://www.youtube.com/playlist?list=PLBlnK6fEyqRhN-sfWgCU1z_Qhakc1AGOn"}], "domain": "prog"}, "s1-g1-l1": {"key": "s1-g1-l1", "label": "Data Structures", "parent": "s1-g1", "desc": "Python provides several built-in data structures for organizing and storing data. These structures include lists, which are ordered and mutable collections; tuples, which are ordered and immutable collections; dictionaries, which store data in key-value pairs; and sets, which are unordered collections of unique elements. Each data structure offers different performance characteristics and is suitable for various tasks depending on the specific requirements of the program.", "links": [{"type": "official", "title": "Data Structures", "url": "https://docs.python.org/3/tutorial/datastructures.html"}, {"type": "video", "title": "Data Structures and Algorithms in Python - Full Course for Beginners", "url": "https://www.youtube.com/watch?v=pkYVOmU3MgA"}], "domain": "prog"}, "s1-g1-l2": {"key": "s1-g1-l2", "label": "Loops", "parent": "s1-g1", "desc": "Loops in Python are a way to repeat a block of code multiple times. They allow you to execute a set of instructions over and over, either a specific number of times or until a certain condition is met. Python has two main types of loops: `for` loops, which are typically used to iterate over a sequence (like a list or string), and `while` loops, which continue executing as long as a given condition remains true.", "links": [{"type": "article", "title": "Loops", "url": "https://www.learnpython.org/en/Loops"}, {"type": "article", "title": "Python While Loops & For Loops | Python tutorial for Beginners", "url": "https://www.youtube.com/watch?v=23vCap6iYSs"}], "domain": "prog"}, "s1-g1-l3": {"key": "s1-g1-l3", "label": "Conditionals", "parent": "s1-g1", "desc": "Conditional statements in Python allow you to execute different blocks of code based on whether a certain condition is true or false. The most common conditional statements are `if`, `elif` (else if), and `else`. An `if` statement checks a condition, and if it's true, the code block under it runs. `elif` allows you to check additional conditions if the initial `if` condition is false. Finally, `else` provides a block of code to execute if none of the preceding `if` or `elif` conditions are true. These statements enable programs to make decisions and respond differently to various inputs or situations.", "links": [{"type": "article", "title": "Conditional Statements in Python", "url": "https://realpython.com/python-conditional-statements/"}, {"type": "video", "title": "Learn Python CONDITIONAL EXPRESSIONS in 5 minutes!", "url": "https://www.youtube.com/watch?v=TYyKQBC4bwE"}], "domain": "prog"}, "s1-g1-l4": {"key": "s1-g1-l4", "label": "Exceptions", "parent": "s1-g1", "desc": "Exceptions in Python are events that disrupt the normal flow of a program's execution. They occur when the interpreter encounters an error during runtime, such as trying to divide by zero or accessing an index that's out of bounds in a list. When an exception occurs, Python creates an exception object. If the exception isn't handled, the program will terminate and display an error message. However, you can use `try` and `except` blocks to catch and handle exceptions, allowing your program to continue running even when errors occur.", "links": [{"type": "official", "title": "Errors and Exceptions", "url": "https://docs.python.org/3/tutorial/errors.html"}, {"type": "article", "title": "Python Exceptions: An Introduction", "url": "https://realpython.com/python-exceptions/"}, {"type": "video", "title": "Learn Python EXCEPTION HANDLING in 5 minutes!", "url": "https://www.youtube.com/watch?v=V_NXT2-QIlE"}], "domain": "prog"}, "s1-g1-l5": {"key": "s1-g1-l5", "label": "Functions, Builtin Functions", "parent": "s1-g1", "desc": "Functions are reusable blocks of code that perform a specific task. They take inputs, process them, and return an output. Python provides many built-in functions like `print()` for displaying output, `len()` for finding the length of a sequence, and `type()` for determining the data type of a variable. These built-in functions are readily available for use, while you can also define your own custom functions, also known as user-defined functions (UDFs), to encapsulate specific logic and improve code organization.", "links": [{"type": "official", "title": "Built-in Functions", "url": "https://docs.python.org/3/library/functions.html"}, {"type": "article", "title": "Python Functions: How to Call & Write Functions", "url": "https://www.datacamp.com/tutorial/functions-python-tutorial"}, {"type": "video", "title": "Functions in Python | Python for Beginners", "url": "https://www.youtube.com/watch?v=zvzjaqMBEso"}], "domain": "prog"}, "s1-g3-l0": {"key": "s1-g3-l0", "label": "Numpy", "parent": "s1-g3", "desc": "NumPy is a fundamental Python library used for numerical computing. It provides support for large, multi-dimensional arrays and matrices, along with a collection of mathematical functions to operate on these arrays efficiently. These arrays are homogeneous, meaning they contain elements of the same data type, which allows for optimized storage and computation. NumPy is widely used in data science, machine learning, and scientific computing due to its performance and ease of use.", "links": [{"type": "official", "title": "NumPy", "url": "https://numpy.org/"}, {"type": "opensource", "title": "NumPy", "url": "https://github.com/numpy/numpy"}, {"type": "article", "title": "Python NumPy Array Tutorial", "url": "https://www.datacamp.com/tutorial/python-numpy-tutorial"}, {"type": "video", "title": "Learn NumPy in 1 hour!", "url": "https://www.youtube.com/watch?v=VXU4LSAQDSc"}], "domain": "prog"}, "s1-g3-l1": {"key": "s1-g3-l1", "label": "Pandas", "parent": "s1-g3", "desc": "Pandas is a library written for the Python programming language for data manipulation and analysis. In particular, it offers data structures and operations for manipulating numerical tables and time series.", "links": [{"type": "official", "title": "pandas - Python Data Analysis Library", "url": "https://pandas.pydata.org/"}, {"type": "video", "title": "Complete Python Pandas Data Science Tutorial! (2025 Updated Edition)", "url": "https://www.youtube.com/watch?v=2uvysYbKdjM"}], "domain": "prog"}, "s1-g3-l2": {"key": "s1-g3-l2", "label": "Matplotlib", "parent": "s1-g3", "desc": "Matplotlib is a paramount data visualization library used extensively by data analysts for generating a wide array of plots and graphs. Through Matplotlib, data analysts can convey results clearly and effectively, driving insights from complex data sets. It offers a hierarchical environment which is very natural for a data scientist to work with. Providing an object-oriented API, it allows for extensive customization and integration into larger applications. From histograms, bar charts, scatter plots to 3D graphs, the versatility of Matplotlib assists data analysts in the better comprehension and compelling representation of data.", "links": [{"type": "official", "title": "Matplotlib", "url": "https://matplotlib.org/"}, {"type": "video", "title": "Learn Matplotlib in 6 minutes", "url": "https://www.youtube.com/watch?v=nzKy9GY12yo"}], "domain": "prog"}, "s1-g3-l3": {"key": "s1-g3-l3", "label": "Seaborn", "parent": "s1-g3", "desc": "Seaborn is a robust, comprehensive Python library focused on the creation of informative and attractive statistical graphics. As a data analyst, seaborn plays an essential role in elaborating complex visual stories with the data. It aids in understanding the data by providing an interface for drawing attractive and informative statistical graphics. Seaborn is built on top of Python's core visualization library Matplotlib, and is integrated with data structures from Pandas. This makes seaborn an integral tool for data visualization in the data analyst's toolkit, making the exploration and understanding of data easier and more intuitive.", "links": [{"type": "official", "title": "Seaborn", "url": "https://seaborn.pydata.org/"}, {"type": "video", "title": "Seaborn Tutorial : Seaborn Full Course", "url": "https://www.youtube.com/watch?v=6GUZXDef2U0"}], "domain": "prog"}, "s1-g4-l0": {"key": "s1-g4-l0", "label": "Databases (SQL, No-SQL)", "parent": "s1-g4", "desc": "Databases are organized collections of data, stored and accessed electronically. SQL databases, like MySQL or PostgreSQL, use a structured, table-based format with a predefined schema, enforcing relationships between data through keys. NoSQL databases, such as MongoDB or Cassandra, offer more flexible data models like document, key-value, or graph, allowing for unstructured or semi-structured data and often prioritizing scalability and speed over strict consistency.", "links": [{"type": "article", "title": "Types of Databases: Relational, NoSQL, Cloud, Vector", "url": "https://www.datacamp.com/blog/types-of-databases-overview"}, {"type": "article", "title": "Types of Databases - MongoDB", "url": "https://www.mongodb.com/resources/basics/databases/types"}], "domain": "prog"}, "s1-g4-l1": {"key": "s1-g4-l1", "label": "Internet", "parent": "s1-g4", "desc": "The internet serves as a vast repository of information that can be leveraged for machine learning projects. This includes publicly available datasets, web pages that can be scraped for relevant information, social media platforms where user-generated content provides insights into opinions and trends, and online databases that offer structured data on various topics. These sources provide a diverse range of data types, from text and images to numerical and categorical data, enabling the development of a wide array of machine learning models.", "links": [], "domain": "prog"}, "s1-g4-l2": {"key": "s1-g4-l2", "label": "APIs", "parent": "s1-g4", "desc": "Application Programming Interfaces, better known as APIs, play a fundamental role in the work of data analysts, particularly in the process of data collection. APIs are sets of protocols, routines, and tools that enable different software applications to communicate with each other. In data analysis, APIs are used extensively to collect, exchange, and manipulate data from different sources in a secure and efficient manner. This data collection process is paramount in shaping the insights derived by the analysts.", "links": [{"type": "article", "title": "What is an API?", "url": "https://aws.amazon.com/what-is/api/"}, {"type": "article", "title": "A Beginner's Guide to APIs", "url": "https://www.postman.com/what-is-an-api/"}], "domain": "prog"}, "s1-g4-l3": {"key": "s1-g4-l3", "label": "Mobile Apps", "parent": "s1-g4", "desc": "Mobile app data refers to the information generated and collected from applications running on mobile devices like smartphones and tablets. This data encompasses a wide range of user interactions, device characteristics, and app performance metrics. It can include user demographics, in-app behavior, location data, device type, operating system, and network information, among other things.", "links": [], "domain": "prog"}, "s1-g4-l4": {"key": "s1-g4-l4", "label": "IoT", "parent": "s1-g4", "desc": "The Internet of Things (IoT) refers to the network of physical devices, vehicles, home appliances, and other items embedded with electronics, software, sensors, and actuators that enable these objects to connect and exchange data. These devices continuously generate vast amounts of data reflecting their status, environment, and interactions. This data can include sensor readings like temperature, pressure, humidity, location, and images or video streams.\n\n*   [@article@What is the Internet of Things (IoT)?](https://www.ibm.com/think/topics/internet-of-things)\n*   [@article@Internet of Things](https://en.wikipedia.org/wiki/Internet_of_things)\n*   [@video@What is IoT (Internet of Things)? An Introduction](https://www.youtube.com/watch?v=4FxU-xpuCww)", "links": [{"type": "article", "title": "What is the Internet of Things (IoT)?", "url": "https://www.ibm.com/think/topics/internet-of-things"}, {"type": "article", "title": "Internet of Things", "url": "https://en.wikipedia.org/wiki/Internet_of_things"}, {"type": "video", "title": "What is IoT (Internet of Things)? An Introduction", "url": "https://www.youtube.com/watch?v=4FxU-xpuCww"}, {"type": "article", "title": "What is the Internet of Things (IoT)?", "url": "https://www.ibm.com/think/topics/internet-of-things"}, {"type": "article", "title": "Internet of Things", "url": "https://en.wikipedia.org/wiki/Internet_of_things"}, {"type": "video", "title": "What is the IoT", "url": "https://www.youtube.com/watch?v=4FxU-xpuCww"}], "domain": "prog"}, "s2-g0-l0": {"key": "s2-g0-l0", "label": "What is an ML Engineer?", "parent": "s2-g0", "desc": "An ML Engineer focuses on building, deploying, and maintaining machine learning systems in production. They bridge the gap between data science and software engineering, taking models developed by data scientists and making them scalable, reliable, and efficient for real-world applications. This involves tasks like data pipeline construction, model deployment, performance monitoring, and infrastructure management.", "links": [{"type": "article", "title": "What Is a Machine Learning Engineer? (+ How to Get Started)", "url": "https://www.coursera.org/articles/what-is-machine-learning-engineer"}], "domain": "role"}, "s2-g0-l1": {"key": "s2-g0-l1", "label": "ML Engineer vs AI Engineer", "parent": "s2-g0", "desc": "An ML Engineer primarily concentrates on building, de
