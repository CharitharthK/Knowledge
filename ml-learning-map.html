ploying, and maintaining machine learning models in production environments. An AI Engineer, on the other hand, typically has a broader scope, encompassing the design and development of entire AI systems, which may include components beyond just machine learning, such as natural language processing, computer vision, and robotics.", "links": [{"type": "video", "title": "AI VS ML Engineer What Do They Do?", "url": "https://www.youtube.com/watch?v=Ff8HHBITvfs"}, {"type": "video", "title": "AI vs Machine Learning", "url": "https://www.youtube.com/watch?v=4RixMPF4xis"}], "domain": "role"}, "s2-g0-l2": {"key": "s2-g0-l2", "label": "Skills and Responsibilities", "parent": "s2-g0", "desc": "Machine learning roles require a blend of technical expertise and practical abilities. These roles involve designing, developing, and deploying machine learning models to solve real-world problems. Key skills include proficiency in programming languages like Python, a strong understanding of statistical concepts, and experience with machine learning frameworks. Responsibilities often encompass data collection and preprocessing, model selection and training, performance evaluation, and continuous model improvement.", "links": [], "domain": "role"}, "s3-g1-l0": {"key": "s3-g1-l0", "label": "CSV", "parent": "s3-g1", "desc": "CSV or Comma Separated Values files play an integral role in data collection for data analysts. These file types allow the efficient storage of data and are commonly generated by spreadsheet software like Microsoft Excel or Google Sheets, but their simplicity makes them compatible with a variety of applications that deal with data. In the context of data analysis, CSV files are extensively used to import and export large datasets, making them essential for any data analyst's toolkit. They allow analysts to organize vast amounts of information into a structured format, which is fundamental in extracting useful insights from raw data.", "links": [{"type": "article", "title": "What is a CSV file: A comprehensive guide", "url": "https://flatfile.com/blog/what-is-a-csv-file-guide-to-uses-and-benefits/"}, {"type": "video", "title": "Understanding CSV Files", "url": "https://www.youtube.com/watch?v=UofTplCVkYI"}], "domain": "data"}, "s3-g1-l1": {"key": "s3-g1-l1", "label": "Excel", "parent": "s3-g1", "desc": "Excel files are a common way to store data in a structured format using rows and columns. Each cell in the spreadsheet can hold different types of data, like numbers, text, or dates. These files are often used for organizing, analyzing, and visualizing data because they are easy to create and manipulate using spreadsheet software.", "links": [], "domain": "data"}, "s3-g1-l2": {"key": "s3-g1-l2", "label": "JSON", "parent": "s3-g1", "desc": "JavaScript Object Notation (JSON) is a standard text-based format for representing structured data based on JavaScript object syntax. It is commonly used for transmitting data in web applications (e.g., sending some data from the server to the client, so it can be displayed on a web page, or vice versa).", "links": [{"type": "article", "title": "Working with JSON", "url": "https://developer.mozilla.org/en-US/docs/Learn/JavaScript/Objects/JSON"}, {"type": "video", "title": "JSON Tutorial for Beginners", "url": "https://www.youtube.com/watch?v=iiADhChRriM"}], "domain": "data"}, "s3-g1-l3": {"key": "s3-g1-l3", "label": "Parquet", "parent": "s3-g1", "desc": "Parquet is a columnar storage format designed for efficient data storage and retrieval. Unlike row-oriented formats, Parquet stores data by columns, which allows for better compression and faster query performance when only a subset of columns are needed. This makes it particularly well-suited for big data processing and analytics, where large datasets are common and queries often target specific columns.", "links": [{"type": "official", "title": "Parquet", "url": "https://parquet.apache.org/"}, {"type": "article", "title": "Parquet - Databricks", "url": "https://www.databricks.com/glossary/what-is-parquet"}], "domain": "data"}, "s3-g1-l4": {"key": "s3-g1-l4", "label": "Other Data Formats", "parent": "s3-g1", "desc": "Beyond the common formats like CSV, Excel, JSON, and Parquet, data can exist in a variety of other structures. These include formats optimized for specific applications or data types. For instance, images are often stored as JPEGs or PNGs, while audio data might be in WAV or MP3 format. Relational databases store data in structured tables accessible through SQL. Furthermore, specialized formats like HDF5 are used for large, complex datasets, particularly in scientific computing, and Protocol Buffers offer an efficient way to serialize structured data. Data can also be unstructured, existing as plain text, log files, or even streaming data from sensors.", "links": [], "domain": "data"}, "s4-g0-l0": {"key": "s4-g0-l0", "label": "Data Cleaning", "parent": "s4-g0", "desc": "Data cleaning, which is often referred as data cleansing or data scrubbing, is one of the most important and initial steps in the data analysis process. As a data analyst, the bulk of your work often revolves around understanding, cleaning, and standardizing raw data before analysis. Data cleaning involves identifying, correcting or removing any errors or inconsistencies in datasets in order to improve their quality. The process is crucial because it directly determines the accuracy of the insights you generate - garbage in, garbage out. Even the most sophisticated models and visualizations would not be of much use if they're based on dirty data. Therefore, mastering data cleaning techniques is essential for any data analyst.", "links": [{"type": "article", "title": "Data cleaning", "url": "https://www.tableau.com/learn/articles/what-is-data-cleaning"}], "domain": "data"}, "s4-g0-l1": {"key": "s4-g0-l1", "label": "Feature Engineering", "parent": "s4-g0", "desc": "Feature engineering is the process of transforming raw data into features that better represent the underlying problem to the predictive models, resulting in improved model accuracy. This involves selecting, transforming, and creating new features from existing data. The goal is to extract more information from the data and make it easier for machine learning algorithms to learn patterns and make accurate predictions.", "links": [{"type": "article", "title": "What is a feature engineering? | IBM", "url": "https://www.ibm.com/think/topics/feature-engineering"}, {"type": "article", "title": "Feature Engineering in Machine Learning: A Practical Guide", "url": "https://www.datacamp.com/tutorial/feature-engineering"}, {"type": "video", "title": "What is feature engineering | Feature Engineering Tutorial Python", "url": "https://www.youtube.com/watch?v=pYVScuY-GPk"}], "domain": "data"}, "s4-g0-l2": {"key": "s4-g0-l2", "label": "Feature Scaling & Normalization", "parent": "s4-g0", "desc": "Feature scaling is a preprocessing technique in machine learning that transforms numerical features to a common scale, ensuring they contribute equally to the model by preventing features with larger ranges from dominating, which is particularly important for algorithms sensitive to feature scales like gradient descent-based methods. Key methods include Standardization (transforming data to a mean of 0 and a standard deviation of 1, often better for outliers), and Normalization (scaling data to a fixed range, often 0 to 1).", "links": [{"type": "article", "title": "Normalization vs. Standardization: How to Know the Difference", "url": "https://www.datacamp.com/tutorial/normalization-vs-standardization"}, {"type": "video", "title": "Standardization vs Normalization Clearly Explained!", "url": "https://www.youtube.com/watch?v=sxEqtjLC0aM"}], "domain": "data"}, "s4-g0-l3": {"key": "s4-g0-l3", "label": "Dimensionality Reduction", "parent": "s4-g0", "desc": "Dimensionality reduction is the process of reducing the number of random variables under consideration by obtaining a set of principal variables. It can be divided into feature selection and feature extraction. Feature selection selects a subset of the original features, while feature extraction transforms the data into a lower-dimensional space. The goal is to simplify the data without losing important information, making it easier to analyze and model.", "links": [{"type": "article", "title": "What is Dimensionality Reduction?", "url": "https://www.ibm.com/think/topics/dimensionality-reduction"}, {"type": "video", "title": "Machine Learning - Dimensionality Reduction", "url": "https://www.youtube.com/watch?v=AU_hBML2H1c"}], "domain": "data"}, "s4-g0-l4": {"key": "s4-g0-l4", "label": "Feature Selection", "parent": "s4-g0", "desc": "Feature selection is the process of choosing a subset of the most relevant features from your original dataset. The goal is to reduce the dimensionality of the data by removing irrelevant, redundant, or noisy features. This can lead to simpler models, improved model performance (e.g., accuracy, speed), and better understanding of the underlying data.", "links": [{"type": "article", "title": "What is Feature Selection? | IBM", "url": "https://www.ibm.com/think/topics/feature-selection"}], "domain": "data"}, "s5-g1-l0": {"key": "s5-g1-l0", "label": "Supervised Learning", "parent": "s5-g1", "desc": "Supervised learning is a type of machine learning where an algorithm learns from a labeled dataset. This means that each data point in the dataset is paired with a corresponding correct output, or \"label.\" The algorithm's goal is to learn a function that maps inputs to outputs, so that when given new, unseen inputs, it can predict the correct output based on the patterns it learned from the labeled data.", "links": [{"type": "article", "title": "What is Supervised Learning?", "url": "https://cloud.google.com/discover/what-is-supervised-learning"}, {"type": "article", "title": "Supervised Machine Learning", "url": "https://www.datacamp.com/blog/supervised-machine-learning"}, {"type": "video", "title": "Supervised Machine Learning Explained For Beginners", "url": "https://www.youtube.com/watch?v=Mu3POlNoLdc"}], "domain": "coreml"}, "s5-g1-l1": {"key": "s5-g1-l1", "label": "Unsupervised Learning", "parent": "s5-g1", "desc": "Unsupervised learning is a type of machine learning where the algorithm learns patterns from unlabeled data. Unlike supervised learning, there are no pre-defined correct answers or target variables provided to guide the learning process. Instead, the algorithm explores the data to discover hidden structures, relationships, and groupings on its own. Common tasks in unsupervised learning include clustering, dimensionality reduction, and anomaly detection.", "links": [{"type": "article", "title": "What is Unsupervised Learning?", "url": "https://cloud.google.com/discover/what-is-unsupervised-learning"}, {"type": "article", "title": "Introduction to Unsupervised Learning", "url": "https://www.datacamp.com/blog/introduction-to-unsupervised-learning"}, {"type": "video", "title": "Unsupervised Machine Learning Explained For Beginners", "url": "https://www.youtube.com/watch?v=yteYU_QpUxs"}], "domain": "coreml"}, "s5-g1-l2": {"key": "s5-g1-l2", "label": "Semi-supervised Learning", "parent": "s5-g1", "desc": "Semi-supervised learning is a type of machine learning where the training data contains both labeled and unlabeled examples. The goal is to leverage the information from the unlabeled data to improve the performance of a model that would otherwise be trained solely on the labeled data. This approach is particularly useful when obtaining labels is expensive or time-consuming, but unlabeled data is readily available.", "links": [{"type": "article", "title": "What is Semi-Supervised Learning?", "url": "https://www.ibm.com/think/topics/semi-supervised-learning"}, {"type": "video", "title": "What is Semi-Supervised Learning?", "url": "https://www.youtube.com/watch?v=C3Lr6Waw66g"}], "domain": "coreml"}, "s5-g1-l3": {"key": "s5-g1-l3", "label": "Self-supervised Learning", "parent": "s5-g1", "desc": "Self-supervised learning is a type of machine learning where the model learns from unlabeled data by creating its own supervisory signals. This is achieved by masking parts of the input data and training the model to predict the masked portions based on the remaining data. In essence, the data itself provides the labels, allowing the model to learn useful representations without requiring explicit human annotation.", "links": [{"type": "article", "title": "What Is Self-Supervised Learning?", "url": "https://www.ibm.com/think/topics/self-supervised-learning"}, {"type": "video", "title": "What is Self Supervised Learning?", "url": "https://www.youtube.com/watch?v=sJzuNAisXHA"}, {"type": "video", "title": "Mark Zuckerberg: AI Learns More Efficiently With Self-Supervised Learning", "url": "https://www.youtube.com/watch?v=R8DduzhT3-w"}], "domain": "coreml"}, "s5-g1-l4": {"key": "s5-g1-l4", "label": "Reinforcement Learning", "parent": "s5-g1", "desc": "Reinforcement learning is a type of machine learning where an agent learns to make decisions in an environment to maximize a reward. The agent interacts with the environment, takes actions, and receives feedback in the form of rewards or penalties. Through trial and error, the agent learns a policy that maps states to actions, aiming to accumulate the most reward over time.", "links": [{"type": "article", "title": "What is reinforcement learning?", "url": "https://online.york.ac.uk/resources/what-is-reinforcement-learning/"}, {"type": "article", "title": "Resources to Learn Reinforcement Learning", "url": "https://towardsdatascience.com/best-free-courses-and-resources-to-learn-reinforcement-learning-ed6633608cb2/"}, {"type": "article", "title": "https://huggingface.co/learn/deep-rl-course/unit0/introduction", "url": "https://huggingface.co/learn/deep-rl-course/unit0/introduction"}, {"type": "article", "title": "Reinforcement Learning in 3 Hours | Full Course using Python", "url": "https://www.youtube.com/watch?v=Mut_u40Sqz4"}], "domain": "coreml"}, "s6-g0-l0": {"key": "s6-g0-l0", "label": "Data Loading", "parent": "s6-g0", "desc": "Data loading in Scikit-learn refers to the process of importing datasets into a format that can be used for machine learning tasks. This involves reading data from various sources, such as CSV files, databases, or even directly from NumPy arrays, and structuring it into a format that Scikit-learn's algorithms can understand, typically NumPy arrays or Pandas DataFrames. The loaded data is then usually split into features (independent variables) and a target variable (dependent variable) for training and evaluating machine learning models.", "links": [{"type": "official", "title": "Dataset loading utilities", "url": "https://scikit-learn.org/stable/datasets.html"}, {"type": "video", "title": "Scikit-Learn Full Crash Course - Python Machine Learning", "url": "https://www.youtube.com/watch?v=SIEaLBXr0rk"}], "domain": "tool"}, "s6-g0-l1": {"key": "s6-g0-l1", "label": "Train - Test Data", "parent": "s6-g0", "desc": "When building a machine learning model, we usually split our dataset into two parts: a training set and a testing set. The training set is used to teach the model how to make predictions, while the testing set is used to evaluate how well the model has learned. This helps us understand if the model can generalize to new, unseen data. In scikit-learn, you can easily split your data using the `train_test_split` function from the `model_selection` module. You provide your data and labels to this function, and it returns the split datasets. You can also specify the proportion of data to be used for testing.", "links": [{"type": "official", "title": "train_test_split", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.model_selection.train_test_split.html"}, {"type": "article", "title": "Split Your Dataset With scikit-learn's train_test_split()", "url": "https://realpython.com/train-test-split-python-data/"}, {"type": "video", "title": "Train Test Split with Python Machine Learning (Scikit-Learn)", "url": "https://www.youtube.com/watch?v=SjOfbbfI2qY"}], "domain": "tool"}, "s6-g0-l2": {"key": "s6-g0-l2", "label": "Data Preparation", "parent": "s6-g0", "desc": "Scikit-learn provides tools to get your data ready for machine learning models. This often involves cleaning, transforming, and scaling your data. Cleaning might mean handling missing values using techniques like imputation. Transformation can involve converting categorical features into numerical ones using methods like one-hot encoding. Scaling ensures that all features contribute equally to the model by bringing them to a similar range, using techniques like standardization or normalization. These steps help improve the performance and accuracy of your machine learning models.", "links": [{"type": "official", "title": "Preprocessing data", "url": "https://scikit-learn.org/stable/modules/preprocessing.html"}, {"type": "video", "title": "Scikit-learn Crash Course - Machine Learning Library for Python", "url": "https://www.youtube.com/watch?v=0B5eIE_1vpU&t=188s"}], "domain": "tool"}, "s6-g0-l3": {"key": "s6-g0-l3", "label": "Model Selection", "parent": "s6-g0", "desc": "Model selection is the process of choosing the best machine learning model from a set of candidate models for a given task. Scikit-learn offers a wide range of models, including linear models (like linear regression and logistic regression), tree-based models (like decision trees and random forests), support vector machines (SVMs), and neural networks, enabling you to find the most suitable model for your specific problem.", "links": [{"type": "official", "title": "Supervised Learning Models", "url": "https://scikit-learn.org/stable/supervised_learning.html"}, {"type": "official", "title": "Unsupervised Learning Models", "url": "https://scikit-learn.org/stable/unsupervised_learning.html"}], "domain": "tool"}, "s6-g0-l4": {"key": "s6-g0-l4", "label": "Tuning", "parent": "s6-g0", "desc": "Scikit-learn provides tools to find the best settings (hyperparameters) for your machine learning models. Instead of manually trying different values, you can use techniques like GridSearchCV or RandomizedSearchCV. These methods systematically test a range of hyperparameter combinations using cross-validation to evaluate performance. The goal is to identify the hyperparameter set that yields the best model performance on your data, improving accuracy and generalization.", "links": [{"type": "official", "title": "Tuning the hyper-parameters of an estimator", "url": "https://scikit-learn.org/stable/modules/grid_search.html"}, {"type": "video", "title": "A Comprehensive Guide to Cross-Validation with Scikit-Learn and Python", "url": "https://www.youtube.com/watch?v=glLNo1ZnmPA"}, {"type": "video", "title": "Hands-On Hyperparameter Tuning with Scikit-Learn: Tips and Tricks", "url": "https://www.youtube.com/watch?v=LrCylIe0RJM"}], "domain": "tool"}, "s6-g0-l5": {"key": "s6-g0-l5", "label": "Prediction", "parent": "s6-g0", "desc": "In scikit-learn, prediction means using a trained machine learning model to estimate an output (or target variable) for new, unseen data. After a model is trained on a dataset, it learns the relationship between the input features and the target variable. To make a prediction, you provide the model with new input features, and it uses the learned relationship to generate a predicted value for the target. This is typically done using the `.predict()` method on a trained model object, which takes the new data as input and returns the model's predictions.", "links": [{"type": "article", "title": "Metrics and scoring: quantifying the quality of predictions", "url": "https://scikit-learn.org/stable/modules/model_evaluation.html"}, {"type": "article", "title": "How to Make Predictions with scikit-learn", "url": "https://machinelearningmastery.com/make-predictions-scikit-learn/"}], "domain": "tool"}, "s7-g1-l0": {"key": "s7-g1-l0", "label": "K-Nearest Neighbors (KNN)", "parent": "s7-g1", "desc": "K-Nearest Neighbors (KNN) is a simple algorithm used for classifying data points based on their proximity to other data points. Given a new, unclassified data point, KNN identifies the 'K' closest data points (neighbors) from the training dataset. The class that appears most frequently among these 'K' neighbors is then assigned as the class of the new data point.", "links": [{"type": "article", "title": "Nearest Neighbors | scikit-learn", "url": "https://scikit-learn.org/stable/modules/neighbors.html"}, {"type": "article", "title": "K-Nearest Neighbors (KNN) Classification with scikit-learn", "url": "https://www.datacamp.com/tutorial/k-nearest-neighbor-classification-scikit-learn"}, {"type": "video", "title": "How to Build Your First KNN Python Model in scikit-learn (K Nearest Neighbors)", "url": "https://www.youtube.com/watch?v=Nz73vXn5afE"}], "domain": "coreml"}, "s7-g1-l1": {"key": "s7-g1-l1", "label": "Logistic Regression", "parent": "s7-g1", "desc": "Logistic Regression is a method used to predict the probability of a categorical outcome. Instead of predicting a continuous value, it predicts whether something belongs to a certain category (like yes/no, true/false, or 0/1). It does this by using a logistic function (also known as a sigmoid function) to squeeze the output of a linear equation between 0 and 1, representing the probability of belonging to that category. The model learns the best coefficients for the linear equation based on the training data.", "links": [{"type": "article", "title": "Logistic Regression | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.LogisticRegression.html"}, {"type": "article", "title": "Understanding Logistic Regression in Python", "url": "https://www.datacamp.com/tutorial/understanding-logistic-regression-python"}, {"type": "video", "title": "Hands-On Machine Learning: Logistic Regression with Python and Scikit-Learn", "url": "https://m.youtube.com/watch?v=aL21Y-u0SRs&pp=0gcJCfwAo7VqN5tD"}], "domain": "coreml"}, "s7-g1-l2": {"key": "s7-g1-l2", "label": "Support Vector Machines", "parent": "s7-g1", "desc": "Support Vector Machines (SVMs) are a type of supervised learning algorithm used for classification and regression. They work by finding an optimal hyperplane that separates data points belonging to different classes with the largest possible margin. This hyperplane acts as a decision boundary, and new data points are classified based on which side of the hyperplane they fall on.", "links": [{"type": "article", "title": "Support Vector Classification (SVC) - scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.svm.SVC.html"}, {"type": "article", "title": "Support Vector Machines with Scikit-learn Tutorial", "url": "https://www.datacamp.com/tutorial/svm-classification-scikit-learn-python"}, {"type": "video", "title": "Mastering Support Vector Machines with Python and Scikit-Learn", "url": "https://www.youtube.com/watch?v=kPkwf1x7zpU"}], "domain": "coreml"}, "s7-g1-l3": {"key": "s7-g1-l3", "label": "Decision Trees, Random Forest", "parent": "s7-g1", "desc": "Decision Trees are a way to make predictions by learning decision rules from data features. Imagine a flowchart where each internal node represents a test on an attribute (like \"Is the color red?\"), each branch represents the outcome of the test, and each leaf node represents a class label (like \"apple\" or \"banana\"). Random Forests improve upon this by creating multiple decision trees on different subsets of the data and features, then combining their predictions to get a more accurate and robust result.", "links": [], "domain": "coreml"}, "s7-g1-l4": {"key": "s7-g1-l4", "label": "Gradient Boosting Machines", "parent": "s7-g1", "desc": "Gradient Boosting Machines are a type of ensemble learning method that combines multiple weak learners, typically decision trees, to create a strong predictive model for classification tasks. The algorithm works iteratively, with each new tree trained to correct the errors made by the previous trees. This is achieved by focusing on the instances that were misclassified in the previous iterations, effectively \"boosting\" the performance of the model. Popular implementations of gradient boosting include XGBoost, LightGBM, CatBoost, and the original GradientBoostingClassifier, each offering variations in regularization, tree growth strategies, and handling of categorical features.", "links": [{"type": "article", "title": "Gradient Boosting Classifier | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.ensemble.GradientBoostingClassifier.html"}, {"type": "article", "title": "A Guide to The Gradient Boosting Algorithm", "url": "https://www.datacamp.com/tutorial/guide-to-the-gradient-boosting-algorithm"}, {"type": "article", "title": "Boosting Algorithms in Machine Learning, Part I: AdaBoost", "url": "https://medium.com/data-science/boosting-algorithms-in-machine-learning-part-i-adaboost-b9d86041a521"}, {"type": "article", "title": "Boosting Algorithms in Machine Learning, Part II: Gradient Boosting", "url": "https://towardsdatascience.com/boosting-algorithms-in-machine-learning-part-ii-gradient-boosting-c155ae505fe9/"}, {"type": "article", "title": "Gradient Boosting in Scikit-Learn: Hands-On Tutorial", "url": "https://www.youtube.com/watch?v=E2mCaIZNE2g"}], "domain": "coreml"}, "s7-g2-l0": {"key": "s7-g2-l0", "label": "Linear Regression", "parent": "s7-g2", "desc": "Linear regression is a simple method used to find the best straight line that describes the relationship between a dependent variable (the one you're trying to predict) and one or more independent variables (the ones you're using to make the prediction). It works by finding the line that minimizes the sum of the squared differences between the actual values and the values predicted by the line. This line can then be used to predict the dependent variable for new values of the independent variables.", "links": [{"type": "article", "title": "Linear Regression | scikit-learn", "url": "https://scikit-learn.org/stable/modules/linear_model.html"}, {"type": "article", "title": "Sklearn Linear Regression: A Complete Guide with Examples", "url": "https://www.datacamp.com/tutorial/sklearn-linear-regression"}, {"type": "video", "title": "Hands-On Linear Regression with Scikit-Learn in Python", "url": "https://www.youtube.com/watch?v=ukZn2RJb7TU"}], "domain": "coreml"}, "s7-g2-l1": {"key": "s7-g2-l1", "label": "Polynomial Regression", "parent": "s7-g2", "desc": "Polynomial regression is a type of supervised learning algorithm used when the relationship between the input features and the output variable is non-linear. Instead of fitting a straight line, it fits a polynomial equation to the data. This allows the model to capture curves and more complex relationships, potentially leading to better predictions when a linear model is insufficient. The degree of the polynomial determines the complexity of the curve that can be fitted.", "links": [{"type": "article", "title": "Polynomial Features | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.preprocessing.PolynomialFeatures.html"}, {"type": "article", "title": "Polynomial Regression in Python using scikit-learn (with a practical example)", "url": "https://data36.com/polynomial-regression-python-scikit-learn/"}, {"type": "article", "title": "Build a Polynomial Regression Model in Python using Scikit-Learn", "url": "https://medium.com/@renadalhendy/build-a-polynomial-regression-model-in-python-using-scikit-learn-1b5fd31beb02"}], "domain": "coreml"}, "s7-g2-l2": {"key": "s7-g2-l2", "label": "Lasso", "parent": "s7-g2", "desc": "Lasso (Least Absolute Shrinkage and Selection Operator) regression is a linear regression technique that adds a penalty term to the ordinary least squares (OLS) objective function. This penalty is based on the absolute values of the coefficients, effectively shrinking some coefficients towards zero. This shrinkage not only helps prevent overfitting, especially when dealing with high-dimensional data, but also performs feature selection by potentially eliminating less important features from the model.", "links": [{"type": "article", "title": "Lasso | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.Lasso.html"}, {"type": "article", "title": "What is lasso regression?", "url": "https://www.ibm.com/think/topics/lasso-regression"}, {"type": "video", "title": "Lasso Regression with Scikit-Learn (Beginner Friendly)", "url": "https://www.youtube.com/watch?v=LmpBt0tenJE"}], "domain": "coreml"}, "s7-g2-l3": {"key": "s7-g2-l3", "label": "Ridge", "parent": "s7-g2", "desc": "Ridge Regression is a linear regression technique that adds a penalty to the size of the coefficients. This penalty, known as L2 regularization, shrinks the coefficient values towards zero. By adding this constraint, Ridge Regression aims to reduce the model's complexity and prevent overfitting, especially when dealing with datasets that have high multicollinearity (where predictor variables are highly correlated).", "links": [{"type": "article", "title": "Ridge | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.Ridge.html"}, {"type": "video", "title": "Mastering Ridge Regression in Python with scikit-learnv", "url": "https://www.youtube.com/watch?v=GMF4Td7KtB0"}], "domain": "coreml"}, "s7-g2-l4": {"key": "s7-g2-l4", "label": "ElasticNet Regularization", "parent": "s7-g2", "desc": "Elastic Net is a regularization technique that combines the penalties of both L1 (Lasso) and L2 (Ridge) regularization methods. It aims to improve model performance by addressing limitations of each individual method, particularly in situations where there are many correlated features. By using a linear combination of L1 and L2 penalties, Elastic Net can perform feature selection (like Lasso) and handle multicollinearity (like Ridge) simultaneously.", "links": [{"type": "article", "title": "ElasticNet| scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.linear_model.ElasticNet.html"}, {"type": "video", "title": "https://www.youtube.com/watch?v=xl6KAAVytEk", "url": "https://www.youtube.com/watch?v=xl6KAAVytEk"}], "domain": "coreml"}, "s8-g1-l0": {"key": "s8-g1-l0", "label": "Exclusive", "parent": "s8-g1", "desc": "Exclusive clustering, also known as hard clustering, is a type of clustering where each data point can only belong to one cluster. This means there's no overlap between clusters; a data point is definitively assigned to a single group. The goal is to partition the data into distinct, non-overlapping clusters based on similarity. For example, K-Means is an exclusive clustering algorithm. It aims to partition n data points into k clusters in which each data point belongs to the cluster with the nearest mean (cluster centers or cluster centroid), serving as a prototype of the cluster.", "links": [{"type": "article", "title": "K-means | scikit-learn", "url": "https://scikit-learn.org/stable/modules/clustering.html#k-means"}, {"type": "article", "title": "Unsupervised Clustering: A Guide", "url": "https://builtin.com/articles/unsupervised-clustering"}], "domain": "coreml"}, "s8-g1-l1": {"key": "s8-g1-l1", "label": "Overlapping", "parent": "s8-g1", "desc": "Overlapping clustering allows data points to belong to multiple clusters simultaneously. Unlike traditional \"hard\" clustering where each point is assigned to only one cluster, overlapping clustering acknowledges that data points can exhibit characteristics of several groups. This is particularly useful when dealing with complex datasets where boundaries between clusters are not well-defined. One algorithm that implements overlapping clustering is the _Fuzzy C-Means (FCM)_ algorithm. FCM assigns a membership degree to each data point for each cluster, representing the probability of belonging to that cluster. A data point can have non-zero membership degrees for multiple clusters, indicating its partial membership in each.", "links": [{"type": "article", "title": "Unsupervised Clustering: A Guide", "url": "https://builtin.com/articles/unsupervised-clustering"}], "domain": "coreml"}, "s8-g1-l2": {"key": "s8-g1-l2", "label": "Hierarchical", "parent": "s8-g1", "desc": "Hierarchical clustering is a method of grouping data points into clusters based on their similarity, building a hierarchy of clusters. It starts by treating each data point as its own cluster and then iteratively merges the closest clusters until only one cluster remains, or a stopping criterion is met. This process creates a tree-like structure called a dendrogram, which visually represents the hierarchy of clusters. Scikit-learn provides an implementation of agglomerative hierarchical clustering through its `AgglomerativeClustering` class, which allows you to specify the linkage criterion (e.g., ward, complete, average) to determine how the distance between clusters is calculated.", "links": [{"type": "article", "title": "Hierarchical clustering | scikit-learn", "url": "https://scikit-learn.org/stable/modules/clustering.html#hierarchical-clustering"}, {"type": "article", "title": "What is Hierarchical Clustering?", "url": "https://www.ibm.com/think/topics/hierarchical-clustering"}], "domain": "coreml"}, "s8-g1-l3": {"key": "s8-g1-l3", "label": "Probabilistic", "parent": "s8-g1", "desc": "Probabilistic clustering assumes that the data is generated from a mixture of probability distributions. Instead of assigning each data point to a single cluster, it provides the probability of a data point belonging to each cluster. A common example is the Gaussian Mixture Model (GMM), where it's assumed that the data points are generated from a mixture of Gaussian distributions. Scikit-learn provides an implementation of GMM that can be used for probabilistic clustering.", "links": [{"type": "article", "title": "Gaussian mixture models", "url": "https://scikit-learn.org/stable/modules/mixture.html#mixture"}, {"type": "article", "title": "Gaussian Mixture Model Explained", "url": "https://scikit-learn.org/stable/modules/mixture.html#mixture"}], "domain": "coreml"}, "s8-g2-l0": {"key": "s8-g2-l0", "label": "Principal Component Analysis", "parent": "s8-g2", "desc": "Principal Component Analysis (PCA) is a technique used to reduce the number of variables in a dataset while preserving the most important information. It transforms the original variables into a new set of variables called principal components, which are ordered by the amount of variance they explain. The first principal component captures the most variance, the second captures the second most, and so on. By selecting a smaller number of these principal components, you can reduce the dimensionality of the data without losing too much information.", "links": [{"type": "article", "title": "PCA | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.decomposition.PCA.html"}, {"type": "article", "title": "What is principal component analysis (PCA)?", "url": "https://www.ibm.com/think/topics/principal-component-analysis"}, {"type": "video", "title": "PCA Analysis in Python Explained (Scikit - Learn)", "url": "https://www.youtube.com/watch?v=6uwa9EkUqpg"}], "domain": "coreml"}, "s8-g2-l1": {"key": "s8-g2-l1", "label": "Autoencoders", "parent": "s8-g2", "desc": "Autoencoders are a type of neural network used to learn efficient data representations in an unsupervised manner. They work by compressing the input data into a lower-dimensional \"code\" and then reconstructing the original input from this compressed representation. By forcing the network to learn a compressed version of the data, autoencoders can discover important features and reduce the dimensionality of the data, making it easier to process and analyze.", "links": [{"type": "article", "title": "What Is an Autoencoder? | IBM", "url": "https://www.ibm.com/think/topics/autoencoder"}], "domain": "coreml"}, "s9-g0-l0": {"key": "s9-g0-l0", "label": "Deep-Q Networks", "parent": "s9-g0", "desc": "Deep Q-Networks (DQNs) are a type of reinforcement learning algorithm that combines Q-learning with deep neural networks. Instead of using a traditional Q-table to store Q-values (which represent the expected reward for taking a specific action in a specific state), DQNs use a neural network to approximate the Q-function. This allows DQNs to handle environments with large or continuous state spaces where a Q-table would be impractical. The neural network takes the state as input and outputs the Q-values for each possible action, enabling the agent to learn optimal policies through trial and error.", "links": [{"type": "article", "title": "The Deep Q-Learning Algorithm", "url": "https://huggingface.co/learn/deep-rl-course/en/unit3/deep-q-algorithm"}, {"type": "video", "title": "Deep Q-Learning/Deep Q-Network (DQN) Explained | Python Pytorch Deep Reinforcement Learning", "url": "https://www.youtube.com/watch?v=EUrWGTCGzlA"}], "domain": "coreml"}, "s9-g0-l1": {"key": "s9-g0-l1", "label": "Policy Gradient", "parent": "s9-g0", "desc": "Policy Gradient methods are a type of reinforcement learning algorithm that directly optimizes the policy function, which maps states to actions. Instead of learning a value function (like Q-learning) and then deriving a policy from it, policy gradient methods directly learn the optimal policy by adjusting its parameters to maximize the expected reward. This is typically done by estimating the gradient of the expected reward with respect to the policy parameters and then updating the parameters in the direction of the gradient.", "links": [{"type": "article", "title": "Policy Gradient Theorem Explained: A Hands-On Introduction", "url": "https://www.datacamp.com/tutorial/policy-gradient-theorem"}, {"type": "video", "title": "An introduction to Policy Gradient methods - Deep Reinforcement Learning", "url": "https://www.youtube.com/watch?v=5P7I-xPq8u8"}], "domain": "coreml"}, "s9-g0-l2": {"key": "s9-g0-l2", "label": "Actor-Critic Methods", "parent": "s9-g0", "desc": "Actor-Critic methods in reinforcement learning are a type of algorithm that combines the strengths of both value-based and policy-based approaches. They use two separate models: an \"actor\" that learns the optimal policy (how to act), and a \"critic\" that estimates the value function (how good a state or action is). The critic evaluates the actor's actions, providing feedback that helps the actor improve its policy, while the actor uses this feedback to refine its decision-making process.", "links": [{"type": "article", "title": "Actor-critic algorithm", "url": "https://en.wikipedia.org/wiki/Actor-critic_algorithm"}, {"type": "article", "title": "Everything You Need To Master Actor Critic Methods | Tensorflow 2 Tutorial", "url": "https://www.youtube.com/watch?v=LawaN3BdI00"}], "domain": "coreml"}, "s9-g0-l3": {"key": "s9-g0-l3", "label": "Q-Learning", "parent": "s9-g0", "desc": "Q-Learning is a type of reinforcement learning algorithm that aims to find the best action to take given the current state. It works by learning a \"Q-function,\" which estimates the expected cumulative reward for taking a specific action in a particular state and following the optimal policy thereafter. This Q-function is iteratively updated based on the agent's experiences, allowing it to learn the optimal policy without needing a model of the environment.", "links": [{"type": "article", "title": "An Introduction to Q-Learning: A Tutorial For Beginners", "url": "https://www.datacamp.com/tutorial/introduction-q-learning-beginner-tutorial"}, {"type": "article", "title": "A Gentle Introduction to Q-Learning", "url": "https://machinelearningmastery.com/a-gentle-introduction-to-q-learning/"}, {"type": "video", "title": "What is Q-Learning (back to basics)", "url": "https://www.youtube.com/watch?v=nOBm4aYEYR4"}], "domain": "coreml"}, "s10-g2-l0": {"key": "s10-g2-l0", "label": "Accuracy", "parent": "s10-g2", "desc": "Accuracy measures how often a machine learning model correctly predicts the outcome. It's calculated by dividing the number of correct predictions by the total number of predictions made. The formula for accuracy is: (Number of Correct Predictions) / (Total Number of Predictions).", "links": [{"type": "article", "title": "Accuracy | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.metrics.accuracy_score.html"}, {"type": "article", "title": "Machine Learning Model Accuracy", "url": "https://www.giskard.ai/glossary/machine-learning-model-accuracy"}], "domain": "coreml"}, "s10-g2-l1": {"key": "s10-g2-l1", "label": "Precision", "parent": "s10-g2", "desc": "Precision measures how accurate a model's positive predictions are. It tells you, out of all the instances the model predicted as positive, what proportion were actually positive. In simpler terms, it answers the question: \"When the model says something is true, how often is it actually true?\". The formula for precision is: Precision = True Positives / (True Positives + False Positives).", "links": [{"type": "article", "title": "Precision | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.metrics.precision_score.html"}], "domain": "coreml"}, "s10-g2-l2": {"key": "s10-g2-l2", "label": "Recall", "parent": "s10-g2", "desc": "Recall measures how well a model identifies all the actual positive cases. It answers the question: \"Of all the actual positive instances, how many did the model correctly predict as positive?\". A high recall means the model is good at minimizing false negatives. The formula for recall is: `Recall = True Positives / (True Positives + False Negatives)`.", "links": [{"type": "article", "title": "Recall | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.metrics.recall_score.html"}], "domain": "coreml"}, "s10-g2-l3": {"key": "s10-g2-l3", "label": "F1-Score", "parent": "s10-g2", "desc": "The F1-score is a way to measure how accurate a model is, considering both precision and recall. Precision tells you how many of the positive predictions made by the model were actually correct. Recall tells you how many of the actual positive cases the model was able to identify. The F1-score balances these two metrics, giving a single score that represents the overall performance of the model. It's calculated as the harmonic mean of precision and recall:`F1-Score = 2 * (Precision * Recall) / (Precision + Recall)`", "links": [{"type": "article", "title": "F1-score | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.metrics.f1_score.html"}], "domain": "coreml"}, "s10-g2-l4": {"key": "s10-g2-l4", "label": "ROC-AUC", "parent": "s10-g2", "desc": "ROC-AUC, or Receiver Operating Characteristic Area Under the Curve, is a performance measurement for classification problems at various threshold settings. ROC is a probability curve that plots the True Positive Rate (TPR) against the False Positive Rate (FPR) at different threshold values. AUC measures the entire two-dimensional area underneath the entire ROC curve from (0,0) to (1,1). AUC provides an aggregate measure of performance across all possible classification thresholds.", "links": [{"type": "article", "title": "ROC-AUC score | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.metrics.roc_auc_score.html"}, {"type": "article", "title": "AUC and the ROC Curve in Machine Learning", "url": "https://www.datacamp.com/tutorial/auc"}, {"type": "article", "title": "Classification: ROC and AUC", "url": "https://developers.google.com/machine-learning/crash-course/classification/roc-and-auc"}], "domain": "coreml"}, "s10-g2-l5": {"key": "s10-g2-l5", "label": "Log Loss", "parent": "s10-g2", "desc": "Log Loss, also known as cross-entropy loss, quantifies the performance of a classification model where the prediction input is a probability value between 0 and 1. It measures the uncertainty of the model's predicted probabilities compared to the actual labels. Lower Log Loss values indicate better calibrated predictions, meaning the predicted probabilities align more closely with the true outcomes.", "links": [{"type": "article", "title": "log_loss | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.metrics.log_loss.html"}, {"type": "article", "title": "Intuition behind Log-loss Score", "url": "https://towardsdatascience.com/intuition-behind-log-loss-score-4e0c9979680a/"}], "domain": "coreml"}, "s10-g2-l6": {"key": "s10-g2-l6", "label": "Confusion Matrix", "parent": "s10-g2", "desc": "A confusion matrix is a table that summarizes the performance of a classification model. It displays the counts of true positive, true negative, false positive, and false negative predictions, allowing for a detailed analysis of the model's accuracy and types of errors it makes. This breakdown helps in understanding where the model excels and where it struggles, providing insights beyond simple accuracy scores.", "links": [{"type": "article", "title": "Confusion matrix | scikit-learn", "url": "https://scikit-learn.org/stable/modules/generated/sklearn.metrics.confusion_matrix.html"}, {"type": "article", "title": "What is A Confusion Matrix in Machine Learning? The Model Evaluation Tool Explained", "url": "https://www.datacamp.com/tutorial/what-is-a-confusion-matrix-in-machine-learning"}], "domain": "coreml"}, "s10-g3-l0": {"key": "s10-g3-l0", "label": "K-Fold Cross Validation", "parent": "s10-g3", "desc": "K-Fold Cross Validation is a technique used to assess how well a machine learning model will generalize to an independent dataset. It works by dividing the available data into _k_ equally sized folds or subsets. The model is then trained _k_ times, each time using _k-1_ folds as the training set and the remaining fold as the validation set. The performance metrics from each of the _k_ iterations are then averaged to provide an overall estimate of the model's performance.", "links": [{"type": "article", "title": "Cross-validation: evaluating estimator performance | scikit-learn", "url": "https://scikit-learn.org/stable/modules/cross_validation.html"}, {"type": "article", "title": "A Comprehensive Guide to K-Fold Cross Validation", "url": "https://www.datacamp.com/tutorial/k-fold-cross-validation"}, {"type": "video", "title": "Complete Guide to Cross Validation", "url": "https://www.youtube.com/watch?v=-8s9KuNo5SA&t=925s"}], "domain": "coreml"}, "s10-g3-l1": {"key": "s10-g3-l1", "label": "LOOCV", "parent": "s10-g3", "desc": "Leave-One-Out Cross-Validation (LOOCV) is a specific type of cross-validation where each single data point in the dataset is used as the test set, while the remaining data points form the training set. This process is repeated for every data point, resulting in as many models being trained and evaluated as there are data points in the original dataset. The final performance metric is then calculated by averaging the performance across all these individual evaluations.", "links": [{"type": "article", "title": "LOOCV for Evaluating Machine Learning Algorithms", "url": "https://www.google.com/search?q=LOOCV&rlz=1C5GCEM_enES1173ES1173&oq=LOOCV&gs_lcrp=EgZjaHJvbWUyBggAEEUYOTIGCAEQRRg70gEGNzZqMGo0qAIAsAIA&sourceid=chrome&ie=UTF-8"}], "domain": "coreml"}, "s11-g0-l0": {"key": "s11-g0-l0", "label": "Perceptron, Multi-layer Perceptrons", "parent": "s11-g0", "desc": "A perceptron is a fundamental building block of neural networks, acting as a single-layer linear classifier. It takes several inputs, multiplies each by a weight, sums them up, and then applies an activation function to produce an output. Multi-layer perceptrons (MLPs) extend this concept by stacking multiple layers of perceptrons, including an input layer, one or more hidden layers, and an output layer, allowing for the modeling of more complex, non-linear relationships in data.", "links": [{"type": "article", "title": "What is Perceptron", "url": "https://www.simplilearn.com/tutorials/deep-learning-tutorial/perceptron"}, {"type": "video", "title": "The Perceptron Explained", "url": "https://www.youtube.com/watch?v=i1G7PXZMnSc"}], "domain": "deep"}, "s11-g0-l1": {"key": "s11-g0-l1", "label": "Forward propagation", "parent": "s11-g0", "desc": "Forward propagation is the process of feeding input data through a neural network to generate an output. It involves taking the inputs, multiplying them by weights, adding biases, and then passing the result through an activation function at each layer of the network. This process is repeated layer by layer until the final output is produced.", "links": [{"type": "article", "title": "Forward Propagation in Neural Networks: A Complete Guide", "url": "https://www.datacamp.com/tutorial/forward-propagation-neural-networks"}, {"type": "video", "title": "Forward Propagation in Neural Networks", "url": "https://www.youtube.com/watch?v=99CcviQchd8"}], "domain": "deep"}, "s11-g0-l2": {"key": "s11-g0-l2", "label": "Back Propagation", "parent": "s11-g0", "desc": "Backpropagation is a fundamental algorithm used to train artificial neural networks. It works by calculating the gradient of the loss function with respect to the network's weights. This gradient is then used to adjust the weights, iteratively reducing the error between the network's predictions and the actual target values. In essence, it's a method for efficiently computing how much each weight in the network contributed to the overall error, allowing for targeted adjustments to improve performance.", "links": [{"type": "article", "title": "What is backpropagation?", "url": "https://www.ibm.com/think/topics/backpropagation"}, {"type": "article", "title": "Understanding Backpropagation", "url": "https://towardsdatascience.com/understanding-backpropagation-abcc509ca9d0/?utm_source=roadmap&utm_medium=Referral&utm_campaign=TDS+roadmap+integration"}], "domain": "deep"}, "s11-g0-l3": {"key": "s11-g0-l3", "label": "Activation Functions", "parent": "s11-g0", "desc": "Activation functions in neural networks determine the output of a node given an input or set of inputs. They introduce non-linearity into the network, allowing it to learn complex patterns and relationships in data. Without activation functions, a neural network would simply be a linear regression model, severely limiting its ability to model intricate data.", "links": [{"type": "article", "title": "Activation Functions in Neural Networks: How to Choose the Right One", "url": "https://towardsdatascience.com/activation-functions-in-neural-networks-how-to-choose-the-right-one-cb20414c04e5/"}, {"type": "article", "title": "Neural networks: Activation functions", "url": "https://developers.google.com/machine-learning/crash-course/neural-networks/activation-functions"}, {"type": "video", "title": "Activation Functions In Neural Networks Explained", "url": "https://www.youtube.com/watch?v=Fu273ovPBmQ"}], "domain": "deep"}, "s11-g0-l4": {"key": "s11-g0-l4", "label": "Loss Functions", "parent": "s11-g0", "desc": "Loss functions measure how well the network's predictions match the actual values. They quantify the difference between the predicted output and the true output for a given input. The goal during training is to minimize this loss, guiding the network to adjust its internal parameters (weights and biases) to make more accurate predictions. Different loss functions are suitable for different types of problems, such as regression or classification.", "links": [{"type": "article", "title": "Loss Functions and Their Use In Neural Networks", "url": "https://towardsdatascience.com/loss-functions-and-their-use-in-neural-networks-a470e703f1e9/"}, {"type": "article", "title": "What is Loss Function? | IBM", "url": "https://www.ibm.com/think/topics/loss-function"}, {"type": "video", "title": "Loss in a Neural Network explained", "url": "https://www.youtube.com/watch?v=Skc8nqJirJg"}], "domain": "deep"}, "s11-g1-l0": {"key": "s11-g1-l0", "label": "TensorFlow", "parent": "s11-g1", "desc": "TensorFlow is an open-source software library created by Google for numerical computation and large-scale machine learning. It provides a flexible architecture and tools that allow users to easily build and deploy machine learning models, particularly deep neural networks. TensorFlow excels at handling complex computations across various platforms, including CPUs, GPUs, and TPUs, making it suitable for research, development, and production environments.", "links": [{"type": "official", "title": "TensorFlow", "url": "https://www.tensorflow.org/"}, {"type": "official", "title": "TensorFlow tutorials", "url": "https://www.tensorflow.org/tutorials"}, {"type": "article", "title": "Mastering Deep Learning with TensorFlow: From Beginner to Expert", "url": "https://towardsdatascience.com/an-introduction-to-tensorflow-fa5b17051f6b/"}, {"type": "video", "title": "Python TensorFlow for Machine Learning – Neural Network Text Classification Tutorial", "url": "https://www.youtube.com/watch?v=VtRLrQ3Ev-U"}], "domain": "deep"}, "s11-g1-l1": {"key": "s11-g1-l1", "label": "Keras", "parent": "s11-g1", "desc": "Keras is a high-level, user-friendly neural networks API written in Python. It acts as an interface for several lower-level backends like TensorFlow, CNTK, and Theano. This allows developers to quickly prototype and build deep learning models without needing to delve into the complexities of the underlying computational frameworks. Keras focuses on enabling fast experimentation through its modularity, ease of use, and support for various neural network layers and optimizers.", "links": [{"type": "course", "title": "Getting Familiar with Keras", "url": "https://towardsdatascience.com/getting-familiar-with-keras-dd17a110652d/"}, {"type": "official", "title": "Keras", "url": "https://keras.io/"}, {"type": "opensource", "title": "Keras", "url": "https://github.com/keras-team/keras"}, {"type": "article", "title": "Keras Crash Course | Deep Learning, Image Modelling, RNNs and More", "url": "https://www.youtube.com/watch?v=a8op1jBG7oM"}], "domain": "deep"}, "s11-g1-l2": {"key": "s11-g1-l2", "label": "Scikit-learn", "parent": "s11-g1", "desc": "Scikit-learn is a popular Python library mainly used for traditional machine learning tasks like classification, regression, and clustering. While it's not primarily designed for deep learning, it does offer basic tools for creating simple neural networks, specifically multi-layer perceptrons (MLPs). You can use `sklearn.neural_network.MLPClassifier` for classification problems and `sklearn.neural_network.MLPRegressor` for regression problems. These tools allow you to quickly build and train basic neural networks without needing a dedicated deep learning framework like TensorFlow or PyTorch.", "links": [{"type": "article", "title": "Neural network models | scikit-learn", "url": "https://scikit-learn.org/stable/modules/neural_networks_supervised.html"}, {"type": "video", "title": "How to train and test a neural network using scikit-learn and Keras in Jupyter Notebook.", "url": "https://www.youtube.com/watch?v=_JG71FIP1rk"}], "domain": "deep"}, "s11-g1-l3": {"key": "s11-g1-l3", "label": "PyTorch", "parent": "s11-g1", "desc": "PyTorch is an open-source machine learning framework primarily developed by Meta AI. It's used for a variety of applications, including computer vision, natural language processing, and reinforcement learning. PyTorch is known for its dynamic computation graph, which allows for more flexibility and easier debugging compared to static graph frameworks. It provides a comprehensive set of tools and libraries to build and train neural networks.", "links": [{"type": "official", "title": "PyTorch", "url": "https://pytorch.org/"}, {"type": "article", "title": "What is PyTorc? | IBM", "url": "https://www.ibm.com/think/topics/pytorch"}, {"type": "video", "title": "PyTorch for Deep Learning & Machine Learning – Full Course", "url": "https://www.youtube.com/watch?v=V_xro1bcAuA"}], "domain": "deep"}, "s11-g2-l0": {"key": "s11-g2-l0", "label": "Convolution", "parent": "s11-g2", "desc": "Convolution is a mathematical operation that involves sliding a filter (also known as a kernel) over an input image or feature map. At each location, the filter performs element-wise multiplication with the corresponding part of the input, and then sums the results. This sum becomes a single value in the output feature map. By sliding the filter across the entire input, the convolution operation extracts features and patterns present in the image, such as edges, textures, or shapes.", "links": [{"type": "article", "title": "Convolutional Neural Networks cheatsheet", "url": "https://stanford.edu/~shervine/teaching/cs-230/cheatsheet-convolutional-neural-networks"}, {"type": "video", "title": "But what is a convolution?", "url": "https://www.youtube.com/watch?v=KuXjwB4LzSA"}], "domain": "deep"}, "s11-g2-l1": {"key": "s11-g2-l1", "label": "Pooling", "parent": "s11-g2", "desc": "Pooling is a downsampling technique used in convolutional neural networks (CNNs) to reduce the spatial dimensions of feature maps. It summarizes the features present in a region of the feature map into a single value. This helps to reduce the computational cost, control overfitting, and make the network more robust to variations in the input, such as small shifts or distortions.", "links": [{"type": "article", "title": "A Gentle Introduction to Pooling Layers for Convolutional Neural Networks", "url": "https://machinelearningmastery.com/pooling-layers-for-convolutional-neural-networks/"}, {"type": "video", "title": "Understanding CNN | Pooling in CNNN", "url": "https://www.youtube.com/watch?v=azRi6Bz7yc0"}], "domain": "deep"}, "s11-g2-l2": {"key": "s11-g2-l2", "label": "Padding", "parent": "s11-g2", "desc": "Padding, in the context of convolutional neural networks, refers to adding extra layers of \"pixels\" or values around the input image or feature map. This is typically done with zeros (zero-padding), but other values can be used. The primary purpose of padding is to control the spatial size of the output feature maps and to manage boundary effects that arise during convolution operations. By strategically adding padding, we can preserve the original input size, prevent information loss at the edges, and improve the performance of the network.", "links": [{"type": "article", "title": "Padding In Convolutional Neural Networks", "url": "https://www.digitalocean.com/community/tutorials/padding-in-convolutional-neural-networks"}, {"type": "video", "title": "Convolution padding and stride", "url": "https://www.youtube.com/watch?v=oDAPkZ53zKk"}], "domain": "deep"}, "s11-g2-l3": {"key": "s11-g2-l3", "label": "Strides", "parent": "s11-g2", "desc": "In convolutional neural networks, a stride determines how many pixels the filter (or kernel) shifts horizontally and vertically during the convolution operation. A stride of 1 means the filter moves one pixel at a time, resulting in a more detailed feature map. A larger stride, like 2 or 3, causes the filter to jump over pixels, producing a smaller feature map and reducing computational cost, but potentially missing finer details in the input image.", "links": [{"type": "article", "title": "Padding and Stride", "url": "https://d2l.ai/chapter_convolutional-neural-networks/padding-and-strides.html"}, {"type": "video", "title": "Convolution padding and stride", "url": "https://www.youtube.com/watch?v=oDAPkZ53zKk"}], "domain": "deep"}, "s11-g3-l0": {"key": "s11-g3-l0", "label": "Image & Video Recognition", "parent": "s11-g3", "desc": "Convolutional Neural Networks (CNNs) are a specialized type of neural network particularly effective at processing images and videos. In image recognition, CNNs can identify objects, scenes, and faces by learning spatial hierarchies of features from pixel data. For video recognition, CNNs analyze sequences of frames to understand actions, events, and even predict future occurrences. This is achieved by extracting relevant spatial and temporal features, enabling applications like video surveillance, autonomous driving, and content analysis.", "links": [], "domain": "deep"}, "s11-g3-l1": {"key": "s11-g3-l1", "label": "Image Classification", "parent": "s11-g3", "desc": "Convolutional Neural Networks (CNNs) are commonly used for image classification tasks. They work by automatically learning relevant features from images through convolutional layers, which detect patterns like edges and textures. These learned features are then used to classify the image into different categories, such as identifying objects like cats, dogs, or cars. CNNs excel at this because they can handle the high dimensionality of image data and are robust to variations in object position, scale, and lighting.", "links": [], "domain": "deep"}, "s11-g3-l2": {"key": "s11-g3-l2", "label": "Image Segmentation", "parent": "s11-g3", "desc": "Image segmentation involves dividing an image into multiple regions or segments, often to identify objects or boundaries. Convolutional Neural Networks (CNNs) are widely used for this task. They learn spatial hierarchies of features from images, enabling pixel-wise classification. This means each pixel is assigned a label indicating which segment it belongs to. For example, in a self-driving car, CNNs can segment images to identify roads, pedestrians, and other vehicles, allowing the car to \"understand\" its surroundings. Other applications include medical image analysis for tumor detection and satellite imagery analysis for land cover classification.", "links": [], "domain": "deep"}, "s11-g3-l3": {"key": "s11-g3-l3", "label": "Recommendation Systems", "parent": "s11-g3", "desc": "Convolutional Neural Networks (CNNs), typically used for image processing, can also enhance recommendation systems. They do this by extracting features from user-item interaction data, like purchase history or ratings. For example, a CNN can analyze a matrix representing user preferences for different movie genres to identify patterns. These patterns help predict what movies a user might enjoy, even if they haven't explicitly rated them. By learning these complex relationships, CNNs can provide more personalized and accurate recommendations.", "links": [], "domain": "deep"}, "s11-g4-l0": {"key": "s11-g4-l0", "label": "RNN", "parent": "s11-g4", "desc": "Recurrent Neural Networks (RNNs) are a type of neural network designed to process sequential data. Unlike standard feedforward networks that treat each input independently, RNNs have connections that loop back on themselves, allowing them to maintain a \"memory\" of past inputs. This memory enables them to learn patterns and dependencies across sequences, making them suitable for tasks like natural language processing, time series analysis, and speech recognition.", "links": [{"type": "article", "title": "Recurrent Neural Network Tutorial (RNN)", "url": "https://www.datacamp.com/tutorial/tutorial-for-recurrent-neural-network"}], "domain": "deep"}, "s11-g4-l1": {"key": "s11-g4-l1", "label": "GRU", "parent": "s11-g4", "desc": "A Gated Recurrent Unit (GRU) is a type of recurrent neural network (RNN) architecture. It's designed to handle the vanishing gradient problem often encountered when training standard RNNs, especially with long sequences of data. GRUs use \"gates\" to control the flow of information, deciding what information to keep and what to discard at each time step. These gates are learned during training and allow the network to selectively remember or forget previous states, making it more effective at capturing long-range dependencies in sequential data.", "links": [{"type": "article", "title": "Understanding Gated Recurrent Unit (GRU) in Deep Learning", "url": "https://medium.com/@anishnama20/understanding-gated-recurrent-unit-gru-in-deep-learning-2e54923f3e2"}, {"type": "article", "title": "GRU Recurrent Neural Networks – A Smart Way to Predict Sequences in Python", "url": "https://towardsdatascience.com/gru-recurrent-neural-networks-a-smart-way-to-predict-sequences-in-python-80864e4fe9f6/"}, {"type": "video", "title": "Simple Explanation of GRU (Gated Recurrent Units)", "url": "https://www.youtube.com/watch?v=tOuXgORsXJ4"}], "domain": "deep"}, "s11-g4-l2": {"key": "s11-g4-l2", "label": "LSTM", "parent": "s11-g4", "desc": "LSTMs are a special kind of recurrent neural network (RNN) architecture designed to handle the vanishing gradient problem that often occurs when training standard RNNs. They excel at processing sequential data by maintaining a \"memory\" of past inputs, allowing them to learn long-term dependencies. This memory is controlled by gates that regulate the flow of information into and out of the cell state, enabling LSTMs to selectively remember or forget information over time.", "links": [{"type": "article", "title": "A Gentle Introduction to Long Short-Term Memory Networks by the Experts", "url": "https://machinelearningmastery.com/gentle-introduction-long-short-term-memory-networks-experts/"}, {"type": "video", "title": "Long Short-Term Memory (LSTM), Clearly Explained", "url": "https://www.youtube.com/watch?v=YCzL96nL7j0"}, {"type": "video", "title": "Simple Explanation of LSTM", "url": "https://www.youtube.com/watch?v=LfnrRPFhku"}], "domain": "deep"}, "s11-g5-l0": {"key": "s11-g5-l0", "label": "Self-Attention", "parent": "s11-g5", "desc": "Self-attention is a mechanism that allows a model to focus on different parts of the input sequence when processing it. Instead of treating each element in the sequence independently, self-attention calculates a weighted sum of all elements, where the weights are determined by the relationships between the elements themselves. This enables the model to capture dependencies and contextual information within the input sequence, regardless of their distance from each other.", "links": [{"type": "article", "title": "What is self-attention?", "url": "https://www.ibm.com/think/topics/self-attention"}, {"type": "video", "title": "Why is Self Attention called \"Self\"? | Self Attention Vs Luong Attention in Depth Lecture", "url": "https://www.youtube.com/watch?v=o4ZVA0TuDRg"}], "domain": "deep"}, "s11-g5-l1": {"key": "s11-g5-l1", "label": "Transformers", "parent": "s11-g5", "desc": "Transformers are a type of neural network architecture that rely on attention mechanisms to weigh the importance of different parts of the input data. Unlike recurrent neural networks (RNNs) that process data sequentially, transformers can process the entire input at once, allowing for parallelization and capturing long-range dependencies more effectively. This architecture is particularly well-suited for tasks involving sequential data, such as natural language processing, where understanding the context of words within a sentence is crucial.", "links": [{"type": "course", "title": "LLM Course | HuggingFace", "url": "https://huggingface.co/learn/llm-course/chapter1/1"}, {"type": "article", "title": "What is a Transformer Model?", "url": "https://www.ibm.com/think/topics/transformer-model"}, {"type": "article", "title": "How Transformers Work: A Detailed Exploration of Transformer Architecture", "url": "https://www.datacamp.com/tutorial/how-transformers-work"}, {"type": "video", "title": "Transformers, explained: Understand the model behind GPT, BERT, and T5", "url": "https://www.youtube.com/watch?v=SZorAJ4I-sA&t"}], "domain": "deep"}, "s11-g5-l2": {"key": "s11-g5-l2", "label": "Multi-head Attention", "parent": "s11-g5", "desc": "Multi-head attention is an attention mechanism that runs through the attention process multiple times independently. Each of these independent attention mechanisms is called a \"head.\" The outputs of all the heads are then concatenated and linearly transformed to produce the final output. This allows the model to attend to different parts of the input sequence with different learned representations, capturing a richer set of relationships than a single attention mechanism could.", "links": [{"type": "article", "title": "Understanding Multi-Head Attention in Transformers", "url": "https://www.datacamp.com/es/tutorial/multi-head-attention-transformers"}, {"type": "article", "title": "Multi-head Attention", "url": "https://d2l.ai/chapter_attention-mechanisms-and-transformers/multihead-attention.html"}], "domain": "deep"}, "s12-g3-l0": {"key": "s12-g3-l0", "label": "Tokenization", "parent": "s12-g3", "desc": "Tokenization is the process of breaking down a text string into smaller units called tokens. These tokens can be words, phrases, symbols, or other meaningful elements. The goal is to convert raw text into a format that can be easily processed and analyzed by a computer.", "links": [{"type": "article", "title": "What is Tokenization? Types, Use Cases, Implementation", "url": "https://www.datacamp.com/blog/what-is-tokenization"}, {"type": "article", "title": "The Art of Tokenization: Breaking Down Text for AI", "url": "https://towardsdatascience.com/the-art-of-tokenization-breaking-down-text-for-ai-43c7bccaed25/"}], "domain": "adv"}, "s12-g3-l1": {"key": "s12-g3-l1", "label": "Lemmatization", "parent": "s12-g3", "desc": "Lemmatization is a text normalization technique in natural language processing used to reduce words to their dictionary form, known as a lemma. Unlike stemming, which simply chops off prefixes or suffixes, lemmatization considers the context of the word and applies morphological analysis to find the base or dictionary form. This ensures that the resulting lemma is a valid word, providing a more accurate and meaningful representation of the original word.", "links": [{"type": "article", "title": "What Are Stemming and Lemmatization?", "url": "https://www.ibm.com/think/topics/stemming-lemmatization"}, {"type": "article", "title": "Stemming, Lemmatization- Which One is Worth Going For?", "url": "https://towardsdatascience.com/stemming-lemmatization-which-one-is-worth-going-for-77e6ec01ad9c/"}], "domain": "adv"}, "s12-g3-l2": {"key": "s12-g3-l2", "label": "Embeddings", "parent": "s12-g3", "desc": "Embeddings are a way to represent words, phrases, or even entire documents as numerical vectors in a high-dimensional space. The goal is to capture the semantic meaning of the text, so that words with similar meanings are located close to each other in the vector space. This allows machine learning models to understand relationships between words and perform tasks like text classification, sentiment analysis, and machine translation more effectively.", "links": [{"type": "article", "title": "Getting Started With Embeddings", "url": "https://huggingface.co/blog/getting-started-with-embeddings"}, {"type": "article", "title": "A Guide on Word Embeddings in NLP", "url": "https://www.turing.com/kb/guide-on-word-embeddings-in-nlp"}], "domain": "adv"}, "s12-g3-l3": {"key": "s12-g3-l3", "label": "Attention Models", "parent": "s12-g3", "desc": "Attention models in natural language processing allow a neural network to focus on specific parts of the input sequence when producing an output. Instead of relying on a fixed-length vector representation of the entire input, these models learn to assign weights to different input elements, indicating their relevance to the current output. This mechanism enables the model to selectively attend to the most important information, improving performance in tasks like machine translation and text summarization.", "links": [{"type": "article", "title": "What is an attention mechanism?", "url": "https://www.ibm.com/think/topics/attention-mechanism"}], "domain": "adv"}, "s12-g3-l4": {"key": "s12-g3-l4", "label": "Stemming", "parent": "s12-g3", "desc": "Stemming is a text normalization technique in natural language processing that reduces words to their root or base form, known as the stem. This is achieved by removing suffixes (like \"-ing\", \"-ed\", \"-s\") from words. The goal is to treat words with similar meanings as the same, even if they have slightly different forms, which helps to simplify text analysis and improve the efficiency of certain NLP tasks.", "links": [{"type": "article", "title": "What are stemming and lemmatization?", "url": "https://www.ibm.com/think/topics/stemming-lemmatization"}], "domain": "adv"}}, "topicEdges": [{"s": "s0-g0", "t": "s11-g0", "k": "prereq"}, {"s": "s0-g1", "t": "s11-g0", "k": "prereq"}, {"s": "s0-g1", "t": "s11-g2", "k": "prereq"}, {"s": "s0-g1", "t": "s8-g2", "k": "prereq"}, {"s": "s0-g3", "t": "s8-g1", "k": "applies"}, {"s": "s0-g3", "t": "s11-g0", "k": "prereq"}, {"s": "s0-g3", "t": "s10-g0", "k": "prereq"}, {"s": "s1-g0", "t": "s6-g0", "k": "applies"}, {"s": "s1-g3", "t": "s6-g0", "k": "applies"}, {"s": "s1-g3", "t": "s4-g0", "k": "applies"}, {"s": "s1-g3", "t": "s0-g1", "k": "applies"}, {"s": "s1-g0", "t": "s11-g1", "k": "applies"}, {"s": "s1-g3", "t": "s0-g3", "k": "applies"}, {"s": "s3-g0", "t": "s3-g1", "k": "builds"}, {"s": "s4-g0", "t": "s7-g1", "k": "applies"}, {"s": "s4-g0", "t": "s8-g2", "k": "applies"}, {"s": "s4-g0", "t": "s6-g0", "k": "builds"}, {"s": "s3-g1", "t": "s4-g0", "k": "builds"}, {"s": "s6-g0", "t": "s7-g1", "k": "applies"}, {"s": "s6-g0", "t": "s7-g2", "k": "applies"}, {"s": "s6-g0", "t": "s8-g1", "k": "applies"}, {"s": "s6-g0", "t": "s10-g3", "k": "applies"}, {"s": "s10-g3", "t": "s6-g0", "k": "applies"}, {"s": "s5-g1", "t": "s5-g0", "k": "builds"}, {"s": "s5-g1", "t": "s7-g0", "k": "builds"}, {"s": "s5-g1", "t": "s8-g0", "k": "builds"}, {"s": "s5-g1", "t": "s9-g0", "k": "builds"}, {"s": "s7-g0", "t": "s7-g1", "k": "builds"}, {"s": "s7-g0", "t": "s7-g2", "k": "builds"}, {"s": "s8-g0",
